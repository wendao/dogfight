<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打飞机 · 天梯联机</title>
<style>
:root{
  --paper:#f6f2e7;--card:#fffdf6;--line:#e3dcc6;--grid:#c6d4e6;
  --ink:#22395c;--ink-soft:#5c6f8c;--sky:#5fa9dd;--hit:#3d9463;
  --head:#d23b34;--pen:#c0392b;--muted:#8d8672;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  min-height:100vh;background:var(--paper);
  background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:26px 26px;color:var(--ink);
  font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans SC",sans-serif;font-size:15px;
}
#app{max-width:1020px;margin:0 auto;padding:20px 14px 60px}
.apphead{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin:6px 0 20px}
.apphead h1{font-family:"Kaiti SC","KaiTi","STKaiti",serif;font-size:34px;margin:0;letter-spacing:6px;border-bottom:3px double var(--pen);padding-bottom:4px}
.apphead .plane{font-size:24px;transform:rotate(-12deg);display:inline-block}
.apphead .sub{color:var(--muted);font-size:13px}
.apphead .spacer{flex:1}
.card{background:var(--card);border:1px solid #e0d8bf;border-radius:10px;box-shadow:0 2px 0 rgba(34,57,92,.07);padding:16px 18px}
.row{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;align-items:flex-start}
.col{display:flex;flex-direction:column;gap:12px}
.center{text-align:center}
h2.sec{font-family:"Kaiti SC","KaiTi","STKaiti",serif;font-size:20px;margin:0 0 10px;letter-spacing:2px}
h2.sec::after{content:"";display:block;width:46px;height:3px;background:var(--pen);margin-top:4px;border-radius:2px}
.note{color:var(--muted);font-size:13px;line-height:1.7}
.red-ink{color:var(--pen);font-family:"Kaiti SC","KaiTi","STKaiti",serif}
.btn{appearance:none;border:1.5px solid var(--ink);border-radius:7px;background:var(--ink);color:#fdfaf2;font-size:15px;padding:9px 20px;cursor:pointer;font-family:inherit;letter-spacing:1px}
.btn:hover{box-shadow:0 2px 0 rgba(34,57,92,.35)}
.btn:active{transform:translateY(1px)}
.btn.ghost{background:transparent;color:var(--ink)}
.btn.red{background:var(--pen);border-color:var(--pen)}
.btn.sm{font-size:13px;padding:6px 12px}
.btn:disabled{opacity:.45;cursor:not-allowed}
input.nick{border:none;border-bottom:2px solid var(--ink);background:transparent;font-size:18px;padding:6px 4px;width:200px;text-align:center;font-family:"Kaiti SC","KaiTi","STKaiti",serif;letter-spacing:2px;color:var(--ink)}
.boardwrap{display:flex;flex-direction:column;gap:8px;align-items:center}
.boardtitle{font-size:14px;letter-spacing:1px;display:flex;gap:8px;align-items:center}
.boardtitle .who{font-family:"Kaiti SC","KaiTi","STKaiti",serif;font-size:17px}
.boardtitle.active .who{border-bottom:3px solid var(--pen)}
.board{display:grid;grid-template-columns:repeat(10,1fr);width:min(92vw,380px);aspect-ratio:1;background:#fff;border:2px solid var(--ink);border-radius:4px;user-select:none;touch-action:manipulation;transition:box-shadow .2s,border-color .2s}
.board.turn-glow{
  border-color:var(--pen);border-width:3px;
  box-shadow:0 0 0 4px rgba(192,57,43,.28),0 0 20px rgba(192,57,43,.4);
  animation:turnpulse 1.2s ease-in-out infinite;
}
@keyframes turnpulse{
  0%,100%{box-shadow:0 0 0 4px rgba(192,57,43,.28),0 0 14px rgba(192,57,43,.35)}
  50%{box-shadow:0 0 0 7px rgba(192,57,43,.5),0 0 26px rgba(192,57,43,.55)}
}
.cell{position:relative;border:1px solid var(--grid);cursor:pointer;background:#fff}
.board.locked .cell{cursor:default}
.cell.sel{box-shadow:inset 0 0 0 2.5px var(--pen);z-index:1}
.cell.sky{background:var(--sky)}
.cell.sil{background:#dde4ee}
.cell.silhead{background:#c4d0e3}
.cell.silhead::before{content:"";position:absolute;inset:24%;clip-path:polygon(50% 4%,96% 90%,4% 90%);box-shadow:inset 0 0 0 100px rgba(34,57,92,.45)}
.cell.hitb::after{content:"";position:absolute;inset:22%;border-radius:50%;background:var(--hit)}
.cell.hith::after{content:"";position:absolute;inset:14%;clip-path:polygon(50% 4%,96% 90%,4% 90%);background:var(--head)}
.cell.pop::after{animation:stamp .22s ease-out}
@keyframes stamp{0%{transform:scale(1.7);opacity:0}70%{transform:scale(.92)}100%{transform:scale(1);opacity:1}}
.cell.last{box-shadow:inset 0 0 0 2.5px var(--pen)}
.cell.pvok{box-shadow:inset 0 0 0 100px rgba(61,148,99,.38)}
.cell.pvbad{box-shadow:inset 0 0 0 100px rgba(210,59,52,.38)}
@media (hover:hover){.board:not(.locked) .cell:hover{box-shadow:inset 0 0 0 100px rgba(34,57,92,.10)}}
.hud{display:flex;gap:18px;align-items:center;justify-content:center;flex-wrap:wrap;font-size:15px}
.hud .big{font-family:"Kaiti SC","KaiTi","STKaiti",serif;font-size:22px;color:var(--pen)}
.turnbanner{text-align:center;font-family:"Kaiti SC","KaiTi","STKaiti",serif;font-size:19px;letter-spacing:2px;margin:2px 0}
.turnbanner .t{color:var(--pen)}
.timer.urgent{color:var(--pen);font-weight:700}
.legend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;font-size:13px;color:var(--ink-soft)}
.legend span{display:inline-flex;align-items:center;gap:5px}
.lg{width:15px;height:15px;border:1px solid var(--grid);display:inline-block;position:relative;background:#fff}
.lg.sky{background:var(--sky)}
.lg.hitb::after{content:"";position:absolute;inset:20%;border-radius:50%;background:var(--hit)}
.lg.hith::after{content:"";position:absolute;inset:12%;clip-path:polygon(50% 4%,96% 90%,4% 90%);background:var(--head)}
.mini{display:grid;grid-template-columns:repeat(5,16px);grid-auto-rows:16px;gap:1px;background:#e8e2d0;border:1px solid #d9d2ba;width:max-content;padding:1px}
.mini i{background:#fff;display:block}
.mini i.b{background:#8fa5c4}
.mini i.h{background:var(--head)}
ol.queue{margin:6px 0;padding-left:24px;line-height:1.9}
ol.queue li.me{color:var(--pen);font-weight:700}
table.lb{border-collapse:collapse;margin:8px auto;font-size:14px;min-width:240px}
table.lb td,table.lb th{border-bottom:1px dashed #d8d0b8;padding:5px 14px;text-align:left}
table.lb th{font-weight:400;color:var(--muted);font-size:12px}
table.lb tr.me td{color:var(--pen);font-weight:700}
.champ{display:flex;align-items:center;gap:10px;justify-content:center;font-family:"Kaiti SC","KaiTi","STKaiti",serif;font-size:19px;letter-spacing:1px}
.champ .streak{font-size:14px;color:var(--pen);border:1px solid var(--pen);border-radius:20px;padding:1px 10px}
.overlay{position:fixed;inset:0;background:rgba(60,52,32,.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px}
.overlay .card{max-width:420px;width:100%;text-align:center}
.overlay h3{font-family:"Kaiti SC","KaiTi","STKaiti",serif;font-size:26px;margin:4px 0 8px;letter-spacing:3px}
.overlay h3.win{color:var(--pen)}
.overlay h3.lose{color:var(--ink-soft)}
#toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fdfaf2;padding:9px 20px;border-radius:8px;opacity:0;pointer-events:none;transition:all .25s;z-index:99;font-size:14px;max-width:90vw}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.statusline{text-align:center;color:var(--ink-soft);font-size:14px;min-height:20px}
.homebtns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:18px}
.homebtns .btn{font-size:17px;padding:13px 34px;letter-spacing:3px;font-family:"Kaiti SC","KaiTi","STKaiti",serif}
.reviewbar{
  position:sticky;bottom:12px;z-index:40;margin:16px auto 0;max-width:520px;
  background:var(--card);border:1.5px solid var(--ink);border-radius:12px;
  box-shadow:0 6px 24px rgba(34,57,92,.18);padding:14px 16px;text-align:center;
}
.reviewbar .actions{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;margin-top:12px}
@media (max-width:820px){.row.battle{flex-direction:column;align-items:center}}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<script>
'use strict';

/* ========== 飞机几何 ========== */
const TPL = ['00200','11111','00100','00100','01110'];
function rotCW(g){const out=[];for(let r=0;r<5;r++){let row='';for(let c=0;c<5;c++)row+=g[4-c][r];out.push(row);}return out;}
const ORIENTS=(()=>{const arr=[];let g=TPL;for(let o=0;o<4;o++){const cells=[];let head=null;
  for(let r=0;r<5;r++)for(let c=0;c<5;c++){const ch=g[r][c];if(ch!=='0'){const cell={dr:r,dc:c,h:ch==='2'};cells.push(cell);if(cell.h)head=cell;}}
  arr.push({cells,head});g=rotCW(g);}return arr;})();
const ONAMES=['机头朝上','机头朝右','机头朝下','机头朝左'];
function planeCells(p){return ORIENTS[p.o].cells.map(x=>({r:p.r+x.dr,c:p.c+x.dc,h:x.h}));}
function headIdx(p){const hd=ORIENTS[p.o].head;return (p.r+hd.dr)*10+(p.c+hd.dc);}
function planeValid(p,others){for(const cell of planeCells(p))if(cell.r<0||cell.r>9||cell.c<0||cell.c>9)return false;
  const hi=headIdx(p);for(const q of others)if(headIdx(q)===hi)return false;return true;}
function randomLayout(existing){const planes=[];const base=existing?existing.slice():[];let guard=0;
  while(planes.length<3-(existing?existing.length:0)){if(++guard>5000)break;
    const p={o:(Math.random()*4)|0,r:(Math.random()*6)|0,c:(Math.random()*6)|0};
    if(planeValid(p,base.concat(planes)))planes.push(p);}
  return (existing||[]).concat(planes);}
function valueMap(planes){const m=new Uint8Array(100);for(const p of planes)for(const cell of planeCells(p)){const i=cell.r*10+cell.c;const v=cell.h?2:1;if(v>m[i])m[i]=v;}return m;}
function headSet(planes){return new Set(planes.map(headIdx));}
function planeAt(orient,i){const hd=ORIENTS[orient].head;return{o:orient,r:((i/10)|0)-hd.dr,c:(i%10)-hd.dc};}

/* ========== 工具 ========== */
const $=s=>document.querySelector(s);
const app=()=>$('#app');
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function h(tag,cls,html){const d=document.createElement(tag);if(cls)d.className=cls;if(html!=null)d.innerHTML=html;return d;}
let toastT=null;
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2600);}
function headerHTML(sub){return '<div class="apphead"><span class="plane">✈️</span><h1>打飞机</h1><span class="sub">'+esc(sub||'局域网天梯')+'</span><span class="spacer"></span></div>';}
function legendHTML(){return '<div class="legend"><span><i class="lg"></i>云</span><span><i class="lg sky"></i>天空</span><span><i class="lg hitb"></i>机身</span><span><i class="lg hith"></i>机头</span></div>';}

function makeBoard(){
  const el=h('div','board');const cells=[];
  for(let i=0;i<100;i++){const d=h('div','cell');d.dataset.i=i;el.appendChild(d);cells.push(d);}
  return{el,cells,clear(){for(const c of cells)c.className='cell';},
    paintSil(planes){if(!planes)return;for(const p of planes)for(const cell of planeCells(p)){
      cells[cell.r*10+cell.c].classList.add(cell.h?'silhead':'sil');}},
    paintShots(shotMap,lastShot=-1,popIdx=-1){if(!shotMap)return;
      for(const [k,r] of Object.entries(shotMap)){const i=+k;const d=cells[i];
        d.classList.add(r==='head'?'hith':r==='body'?'hitb':'sky');
        if(i===popIdx)d.classList.add('pop');if(i===lastShot)d.classList.add('last');}},
    paint({silPlanes,shotMap,lastShot=-1,popIdx=-1,selIdx=-1}={}){
      this.clear();this.paintSil(silPlanes);this.paintShots(shotMap,lastShot,popIdx);
      if(selIdx>=0&&selIdx<100)cells[selIdx].classList.add('sel');}};
}

/** 双击确认：同一格连点两次才执行，防平板误触 */
function makeDoubleTap(onConfirm,onSelect){
  let pending=-1;
  return{
    reset(){pending=-1;if(onSelect)onSelect(-1);},
    tap(i){
      if(pending===i){pending=-1;if(onSelect)onSelect(-1);onConfirm(i);return true;}
      pending=i;if(onSelect)onSelect(i);return false;
    },
    get pending(){return pending;}
  };
}

/* ========== 状态 ========== */
let ME=null; // {id,name,token}
let CUR=null;
let socket=null;
let ladder=null;
let match=null;
let reconnecting=false;
const SCREENS={};
const MP={};

function go(name,arg){
  if(CUR&&SCREENS[CUR].leave)SCREENS[CUR].leave();
  CUR=name;app().innerHTML='';
  SCREENS[name].enter(arg);
}

function savePlayer(p){
  ME=p;
  try{
    localStorage.setItem('fly-player',JSON.stringify({id:p.id,name:p.name,token:p.token}));
    localStorage.setItem('fly-name',p.name||'');
  }catch{}
}
function loadPlayer(){
  try{
    const raw=localStorage.getItem('fly-player');
    if(!raw)return null;
    const p=JSON.parse(raw);
    if(p&&p.token&&p.id)return p;
  }catch{}
  return null;
}
function clearPlayer(){
  try{localStorage.removeItem('fly-player');}catch{}
}

/** 同名时加 id 后缀，避免两人看起来一样 */
function labelOf(p, list){
  if(!p)return '?';
  const name=p.name||'玩家';
  const arr=list||[];
  const clash=arr.filter(x=>x&&x.name===name).length>1;
  return clash? name+'·'+String(p.id||'').slice(0,4) : name;
}
function allKnownPlayers(){
  const list=[];
  if(ladder&&ladder.champion)list.push(ladder.champion);
  if(ladder&&ladder.queue)list.push(...ladder.queue);
  if(match&&match.players)list.push(...match.players);
  return list;
}

/* ========== 网络 ========== */
async function apiLogin(name, token){
  const r=await fetch('/api/login',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({name, token:token||undefined})
  });
  const j=await r.json();
  if(!j.ok)throw new Error(j.error||'登录失败');
  return {player:j.player, resumed:!!j.resumed};
}

function wsSend(obj){if(socket&&socket.readyState===1)socket.send(JSON.stringify(obj));}

function connectWS(){
  return new Promise((resolve,reject)=>{
    if(socket){
      try{socket.onclose=null;socket.close();}catch{}
      socket=null;
    }
    const proto=location.protocol==='https:'?'wss:':'ws:';
    const ws=new WebSocket(proto+'//'+location.host+'/ws');
    socket=ws;
    let done=false;
    ws.onopen=()=>wsSend({type:'auth',token:ME.token});
    ws.onmessage=(ev)=>{
      let msg;try{msg=JSON.parse(ev.data);}catch{return;}
      if(msg.type==='auth_ok'){
        if(msg.player)savePlayer({...ME,...msg.player,token:ME.token});
        if(!done){done=true;reconnecting=false;resolve(msg);}
      }
      if(msg.type==='error'&&!done){done=true;reject(new Error(msg.error));}
      onMsg(msg);
    };
    ws.onerror=()=>{if(!done){done=true;reject(new Error('连接失败'));}};
    ws.onclose=()=>{
      if(CUR&&CUR!=='home'&&!reconnecting){
        reconnecting=true;
        toast('连接断开，正在重连…');
      }
      setTimeout(()=>{
        if(!ME||!ME.token||CUR==='home')return;
        connectWS().then(()=>{
          if(CUR==='lobby'||CUR==='place'||CUR==='battle'){
            wsSend({type:'join_ladder'});
            wsSend({type:'sync'});
          }
        }).catch(()=>{reconnecting=false;});
      },1500);
    };
  });
}

/** 登录并进天梯（支持 token 重连恢复身份） */
async function enterLadder(name){
  const saved=loadPlayer();
  const {player, resumed}=await apiLogin(name, saved&&saved.token);
  savePlayer(player);
  await connectWS();
  go('lobby');
  if(resumed)toast('已恢复身份，可继续对局');
}

function routeMatch(m){
  if(!m||!ME)return;
  const inMatch=m.players&&m.players.some(p=>p.id===ME.id);
  if(!inMatch)return;
  if(m.phase==='place'&&CUR!=='place')go('place');
  else if(m.phase==='battle'&&CUR!=='battle')go('battle');
  else if(m.phase==='over'&&CUR!=='battle')go('battle');
}

function onMsg(msg){
  if(msg.type==='ladder_state'){
    ladder=msg;
    if(CUR==='battle'&&MP.reviewing){
      if(SCREENS.battle.onLadder)SCREENS.battle.onLadder(msg);
      return;
    }
    // 重连后若在对局中，自动跳回
    if(msg.you&&msg.you.inMatch&&msg.matchSummary){
      if(CUR==='lobby'||CUR==='home'){
        // 等 match_state 再跳，避免缺布局
      }
    }
    if(SCREENS[CUR]&&SCREENS[CUR].onLadder)SCREENS[CUR].onLadder(msg);
  }
  if(msg.type==='match_state'){
    match=msg.match;
    if(msg.match)routeMatch(msg.match);
    if(SCREENS[CUR]&&SCREENS[CUR].onMatch)SCREENS[CUR].onMatch(msg.match);
  }
  if(msg.type==='shot_result'){
    if(SCREENS[CUR]&&SCREENS[CUR].onShot)SCREENS[CUR].onShot(msg);
  }
  if(msg.type==='place_ok'){
    if(SCREENS[CUR]&&SCREENS[CUR].onPlaceOk)SCREENS[CUR].onPlaceOk();
  }
  if(msg.type==='error'){
    // token 失效（服务重启）：清本地身份
    if(msg.error&&String(msg.error).includes('认证')){
      clearPlayer();
    }
    toast(msg.error||'错误');
  }
  if(msg.type==='left_ladder'){/* ok */}
}

/* ========== 首页 ========== */
SCREENS.home={
  enter(){
    const root=app();
    root.appendChild(h('div',null,headerHTML('局域网天梯 · 浏览器直接玩')));
    const card=h('div','card center');
    card.style.maxWidth='460px';card.style.margin='40px auto 0';
    const savedP=loadPlayer();
    const saved=(savedP&&savedP.name)||localStorage.getItem('fly-name')||'';
    card.innerHTML=
      '<h2 class="sec" style="display:inline-block">飞行员登记</h2>'
      +'<div style="margin:14px 0 6px"><input id="nick" class="nick" maxlength="12" placeholder="写下你的代号" value="'+esc(saved)+'"></div>'
      +(savedP?'<div class="note" style="margin-bottom:8px">已保存身份 <b class="red-ink">'+esc(savedP.name)+'</b>（'+esc(savedP.id)+'），刷新可重连同一账号</div>':'')
      +'<div class="homebtns">'
      +'<button class="btn" id="btnSingle">单人练习</button>'
      +'<button class="btn red" id="btnLadder">进入天梯</button>'
      +'</div>'
      +(savedP?'<div style="margin-top:10px"><button class="btn ghost sm" id="btnNewId">换新身份</button></div>':'')
      +'<div class="note" style="margin-top:18px">10×10 方格里藏着 3 架飞机，蓝色是天空，绿圆是机身机翼，红三角是机头。<br>'
      +'集齐 3 个红三角即获胜。天梯：把本页地址发给同一 Wi‑Fi 的朋友即可联机。胜者守擂，败者垫底。<br>'
      +'掉线/刷新后 <b>60 秒内</b>再进天梯可恢复对局。身份按账号 id，同名无妨。<br>'
      +'当前地址：<b class="red-ink">'+esc(location.origin)+'</b></div>'
      +'<div id="homelb" style="margin-top:14px"></div>';
    root.appendChild(card);
    $('#btnSingle').onclick=async()=>{
      const name=$('#nick').value.trim();
      localStorage.setItem('fly-name',name);
      ME={id:'local',name:name||'飞行员',token:''};
      go('single');
    };
    $('#btnLadder').onclick=async()=>{
      const name=$('#nick').value.trim();
      if(!name){toast('请输入代号');return;}
      try{await enterLadder(name);}
      catch(e){toast('连不上服务器');console.error(e);}
    };
    const bn=$('#btnNewId');
    if(bn)bn.onclick=()=>{clearPlayer();toast('已清除旧身份');go('home');};
    $('#nick').addEventListener('keydown',e=>{if(e.key==='Enter')$('#btnLadder').click();});
    this.loadLb();
  },
  async loadLb(){
    const best=+localStorage.getItem('sp-best')||0;
    const meName=localStorage.getItem('fly-name')||'';
    let html='';
    if(best)html+='<div class="red-ink">个人最少步数纪录：'+best+' 步</div>';
    try{
      const lb=await fetchSpLb();
      if(lb.length){
        html+='<table class="lb"><tr><th>#</th><th>全服单人榜</th><th>步数</th></tr>';

async function fetchSpLb(){
  try{
    const r=await fetch('/api/sp-lb');
    const j=await r.json();
    return j.ok? (j.lb||[]) : [];
  }catch{return [];}
}
async function postSpScore(steps,name){
  try{
    const r=await fetch('/api/sp-score',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({steps,name})
    });
    const j=await r.json();
    return j.ok? (j.lb||[]) : null;
  }catch{return null;}
}
function renderLbHtml(el,lb,best,meName){
  if(!el)return;
  let html='';
  if(best)html+='<div class="red-ink" style="margin-bottom:4px">我的最佳：'+best+' 步</div>';
  if(lb&&lb.length){
    html+='<table class="lb" style="margin:4px 0;min-width:0;width:100%"><tr><th>#</th><th>飞行员</th><th>步数</th></tr>';
    lb.forEach((r,i)=>{html+='<tr'+(meName&&r.n===meName?' class="me"':'')+'><td>'+(i+1)+'</td><td>'+esc(r.n)+'</td><td>'+r.s+'</td></tr>';});
    html+='</table>';
  }else html+='<div>还没有任何纪录，打完这一局，榜首就是你！</div>';
  el.innerHTML=html;
}

    });

      const t=e.target.closest('.cell');if(!t)return;
      const i=+t.dataset.i;
      const m=match;if(!m||m.phase!=='battle'||m.turn!==ME.id)return;
      if(m.shotResults&&m.shotResults[i]!=null)return;
      const confirmed=MP.fireTap.tap(i);
      if(!confirmed)toast('再点一次确认开火');
    });
    $('#btQuit').onclick=()=>{if(confirm('确定认输并退出？')){wsSend({type:'surrender'});wsSend({type:'leave_ladder'});if(socket)socket.close();go('home');}};
    this.secIv=setInterval(()=>this.sec(),500);
    if(match)this.onMatch(match);
  },
  repaintEnemySel(){
    if(!MP.enemyB)return;
    for(const c of MP.enemyB.cells)c.classList.remove('sel');
    if(MP.fireSel>=0)MP.enemyB.cells[MP.fireSel].classList.add('sel');
  },
  doFire(i){
    const m=match;if(!m||m.phase!=='battle'||m.turn!==ME.id||MP.busyFire)return;
    if(m.shotResults&&m.shotResults[i]!=null)return;
    MP.busyFire=true;MP.fireSel=-1;
    wsSend({type:'fire',i});
    setTimeout(()=>{MP.busyFire=false;},400);
  },
  onShot(msg){
    if(msg.by===ME.id&&MP.enemyB)MP.enemyB.cells[msg.i].classList.add('pop');
    else if(MP.mineB&&msg.i!=null)MP.mineB.cells[msg.i].classList.add('pop');
  },
  onLadder(_msg){
    // 复盘中忽略跳转
  },
  onMatch(m){
    if(CUR!=='battle')return;
    if(MP.reviewing)return;
    if(m.phase==='place'){go('place');return;}
    if(!m.players.some(p=>p.id===ME.id)){go('lobby');return;}
    const opp=m.players.find(p=>p.id!==ME.id);
    const myTurn=m.phase==='battle'&&m.turn===ME.id;
    MP.mineB.paint({silPlanes:m.myLayout,shotMap:m.boardShots,
      lastShot:m.oppShots&&m.oppShots.length?m.oppShots[m.oppShots.length-1]:-1});
    let enemyMap=m.shotResults||{};
    let sil=null;
    if(m.phase==='over'&&m.reveal&&opp)sil=m.reveal[opp.id];
    MP.enemyB.paint({silPlanes:sil,shotMap:enemyMap,
      lastShot:m.myShots&&m.myShots.length?m.myShots[m.myShots.length-1]:-1,
      selIdx:myTurn?MP.fireSel:-1});
    MP.enemyB.el.classList.toggle('locked',!myTurn||m.phase==='over');
    MP.enemyB.el.classList.toggle('turn-glow',myTurn);
    $('#btMy').textContent=(m.killed&&m.killed[ME.id])||0;
    $('#btOp').textContent=(opp&&m.killed&&m.killed[opp.id])||0;
    $('#btT0').className='boardtitle'+(m.turn===opp.id&&m.phase==='battle'?' active':'');
    $('#btT1').className='boardtitle'+(myTurn?' active':'');
    const bn=$('#btBanner');
    if(m.phase==='battle'){
      bn.innerHTML=myTurn
        ?'<span class="t">轮到你开火</span> —— 同一格点两次确认'
        :'等待 <span class="t">'+esc(opp?labelOf(opp,m.players):'')+'</span> 行动…';
    }
    const myTos=(m.tos&&m.tos[ME.id])||0,opTos=(opp&&m.tos&&m.tos[opp.id])||0;
    $('#btTos').textContent=(myTos||opTos)?('超时 你'+myTos+'/3 · 对方'+opTos+'/3'):'';
    MP.turnEnd=m.turnEnd;
    if(!myTurn&&MP.fireTap){MP.fireTap.reset();MP.fireSel=-1;}
    if(m.phase==='over')this.onOver(m);
  },
  sec(){
    if(MP.reviewing)return;
    const el=$('#btTimer');if(!el||!MP.turnEnd)return;
    const left=Math.max(0,Math.ceil((MP.turnEnd-Date.now())/1000));
    el.textContent=left;el.classList.toggle('urgent',left<=10);
  },
  onOver(m){
    if(MP.overShown)return;MP.overShown=true;MP.reviewing=true;
    MP.frozenMatch=m;
    if(MP.fireTap)MP.fireTap.reset();
    MP.fireSel=-1;
    MP.enemyB.el.classList.add('locked');
    MP.enemyB.el.classList.remove('turn-glow');
    const win=m.winner===ME.id;
    const opp=m.players.find(p=>p.id!==ME.id);
    // 确保对手布局已揭晓
    if(opp&&m.reveal){
      MP.enemyB.paint({silPlanes:m.reveal[opp.id],shotMap:m.shotResults||{},
        lastShot:m.myShots&&m.myShots.length?m.myShots[m.myShots.length-1]:-1});
    }
    const bn=$('#btBanner');
    if(bn)bn.innerHTML=win?'<span class="t">胜利！</span> 可查看双方布局复盘':'落败 —— 可查看对手布局复盘';
    const bar=$('#reviewBar');
    if(bar){
      bar.style.display='block';
      bar.innerHTML='<h3 class="'+(win?'win':'lose')+'" style="margin:0 0 6px;font-size:22px;letter-spacing:2px">'+(win?'胜利！':'落败')+'</h3>'
        +'<div>'+esc(m.reason||'')+'</div>'
        +'<div class="note" style="margin-top:6px">棋盘已揭晓，可慢慢复盘。就绪后再离开。</div>'
        +'<div class="actions">'
        +'<button class="btn" id="rvLobby">'+(win?'返回大厅守擂':'回到队尾')+'</button>'
        +'<button class="btn ghost" id="rvLeave">离开天梯</button>'
        +'</div>';
      $('#rvLobby').onclick=()=>{
        MP.reviewing=false;
        wsSend({type:'join_ladder'});
        go('lobby');
      };
      $('#rvLeave').onclick=()=>{
        MP.reviewing=false;
        wsSend({type:'leave_ladder'});
        if(socket)try{socket.close();}catch(e){}
        go('home');
      };
    }
    const quit=$('#btQuit');if(quit)quit.style.display='none';
  },
  leave(){if(this.secIv)clearInterval(this.secIv);MP.reviewing=false;document.querySelectorAll('.overlay').forEach(o=>o.remove());}
};

/* ========== 启动 ========== */
go('home');
setInterval(()=>{if(socket&&socket.readyState===1)wsSend({type:'ping'});},5000);
</script>
</body>
</html>
