<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打飞机 · 天梯联机</title>
<style>
:root{
  --paper:#f6f2e7;--card:#fffdf6;--line:#e3dcc6;--grid:#c6d4e6;
  --ink:#22395c;--ink-soft:#5c6f8c;--sky:#5fa9dd;--hit:#3d9463;
  --head:#d23b34;--pen:#c0392b;--muted:#8d8672;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  min-height:100vh;background:var(--paper);
  background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);
  background-size:26px 26px;color:var(--ink);
  font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans SC",sans-serif;font-size:15px;
}
#app{max-width:1020px;margin:0 auto;padding:20px 14px 60px}
.apphead{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin:6px 0 20px}
.apphead h1{font-family:"Kaiti SC","KaiTi","STKaiti",serif;font-size:34px;margin:0;letter-spacing:6px;border-bottom:3px double var(--pen);padding-bottom:4px}
.apphead .plane{font-size:24px;transform:rotate(-12deg);display:inline-block}
.apphead .sub{color:var(--muted);font-size:13px}
.apphead .spacer{flex:1}
.card{background:var(--card);border:1px solid #e0d8bf;border-radius:10px;box-shadow:0 2px 0 rgba(34,57,92,.07);padding:16px 18px}
.row{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;align-items:flex-start}
.col{display:flex;flex-direction:column;gap:12px}
.center{text-align:center}
h2.sec{font-family:"Kaiti SC","KaiTi","STKaiti",serif;font-size:20px;margin:0 0 10px;letter-spacing:2px}
h2.sec::after{content:"";display:block;width:46px;height:3px;background:var(--pen);margin-top:4px;border-radius:2px}
.note{color:var(--muted);font-size:13px;line-height:1.7}
.red-ink{color:var(--pen);font-family:"Kaiti SC","KaiTi","STKaiti",serif}
.btn{appearance:none;border:1.5px solid var(--ink);border-radius:7px;background:var(--ink);color:#fdfaf2;font-size:15px;padding:9px 20px;cursor:pointer;font-family:inherit;letter-spacing:1px}
.btn:hover{box-shadow:0 2px 0 rgba(34,57,92,.35)}
.btn:active{transform:translateY(1px)}
.btn.ghost{background:transparent;color:var(--ink)}
.btn.red{background:var(--pen);border-color:var(--pen)}
.btn.sm{font-size:13px;padding:6px 12px}
.btn:disabled{opacity:.45;cursor:not-allowed}
input.nick{border:none;border-bottom:2px solid var(--ink);background:transparent;font-size:18px;padding:6px 4px;width:200px;text-align:center;font-family:"Kaiti SC","KaiTi","STKaiti",serif;letter-spacing:2px;color:var(--ink)}
.boardwrap{display:flex;flex-direction:column;gap:8px;align-items:center}
.boardtitle{font-size:14px;letter-spacing:1px;display:flex;gap:8px;align-items:center}
.boardtitle .who{font-family:"Kaiti SC","KaiTi","STKaiti",serif;font-size:17px}
.boardtitle.active .who{border-bottom:3px solid var(--pen)}
.board{display:grid;grid-template-columns:repeat(10,1fr);width:min(92vw,380px);aspect-ratio:1;background:#fff;border:2px solid var(--ink);border-radius:4px;user-select:none;touch-action:manipulation}
.cell{position:relative;border:1px solid var(--grid);cursor:pointer;background:#fff}
.board.locked .cell{cursor:default}
.cell.sky{background:var(--sky)}
.cell.sil{background:#dde4ee}
.cell.silhead{background:#c4d0e3}
.cell.silhead::before{content:"";position:absolute;inset:24%;clip-path:polygon(50% 4%,96% 90%,4% 90%);box-shadow:inset 0 0 0 100px rgba(34,57,92,.45)}
.cell.hitb::after{content:"";position:absolute;inset:22%;border-radius:50%;background:var(--hit)}
.cell.hith::after{content:"";position:absolute;inset:14%;clip-path:polygon(50% 4%,96% 90%,4% 90%);background:var(--head)}
.cell.pop::after{animation:stamp .22s ease-out}
@keyframes stamp{0%{transform:scale(1.7);opacity:0}70%{transform:scale(.92)}100%{transform:scale(1);opacity:1}}
.cell.last{box-shadow:inset 0 0 0 2.5px var(--pen)}
.cell.pvok{box-shadow:inset 0 0 0 100px rgba(61,148,99,.38)}
.cell.pvbad{box-shadow:inset 0 0 0 100px rgba(210,59,52,.38)}
@media (hover:hover){.board:not(.locked) .cell:hover{box-shadow:inset 0 0 0 100px rgba(34,57,92,.10)}}
.hud{display:flex;gap:18px;align-items:center;justify-content:center;flex-wrap:wrap;font-size:15px}
.hud .big{font-family:"Kaiti SC","KaiTi","STKaiti",serif;font-size:22px;color:var(--pen)}
.turnbanner{text-align:center;font-family:"Kaiti SC","KaiTi","STKaiti",serif;font-size:19px;letter-spacing:2px;margin:2px 0}
.turnbanner .t{color:var(--pen)}
.timer.urgent{color:var(--pen);font-weight:700}
.legend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;font-size:13px;color:var(--ink-soft)}
.legend span{display:inline-flex;align-items:center;gap:5px}
.lg{width:15px;height:15px;border:1px solid var(--grid);display:inline-block;position:relative;background:#fff}
.lg.sky{background:var(--sky)}
.lg.hitb::after{content:"";position:absolute;inset:20%;border-radius:50%;background:var(--hit)}
.lg.hith::after{content:"";position:absolute;inset:12%;clip-path:polygon(50% 4%,96% 90%,4% 90%);background:var(--head)}
.mini{display:grid;grid-template-columns:repeat(5,16px);grid-auto-rows:16px;gap:1px;background:#e8e2d0;border:1px solid #d9d2ba;width:max-content;padding:1px}
.mini i{background:#fff;display:block}
.mini i.b{background:#8fa5c4}
.mini i.h{background:var(--head)}
ol.queue{margin:6px 0;padding-left:24px;line-height:1.9}
ol.queue li.me{color:var(--pen);font-weight:700}
.champ{display:flex;align-items:center;gap:10px;justify-content:center;font-family:"Kaiti SC","KaiTi","STKaiti",serif;font-size:19px;letter-spacing:1px}
.champ .streak{font-size:14px;color:var(--pen);border:1px solid var(--pen);border-radius:20px;padding:1px 10px}
.overlay{position:fixed;inset:0;background:rgba(60,52,32,.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:16px}
.overlay .card{max-width:420px;width:100%;text-align:center}
.overlay h3{font-family:"Kaiti SC","KaiTi","STKaiti",serif;font-size:26px;margin:4px 0 8px;letter-spacing:3px}
.overlay h3.win{color:var(--pen)}
.overlay h3.lose{color:var(--ink-soft)}
#toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);background:var(--ink);color:#fdfaf2;padding:9px 20px;border-radius:8px;opacity:0;pointer-events:none;transition:all .25s;z-index:99;font-size:14px;max-width:90vw}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.statusline{text-align:center;color:var(--ink-soft);font-size:14px;min-height:20px}
.homebtns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:18px}
.homebtns .btn{font-size:17px;padding:13px 34px;letter-spacing:3px;font-family:"Kaiti SC","KaiTi","STKaiti",serif}
@media (max-width:820px){.row.battle{flex-direction:column;align-items:center}}
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<script>
'use strict';

/* ========== 飞机几何 ========== */
const TPL = ['00200','11111','00100','00100','01110'];
function rotCW(g){const out=[];for(let r=0;r<5;r++){let row='';for(let c=0;c<5;c++)row+=g[4-c][r];out.push(row);}return out;}
const ORIENTS=(()=>{const arr=[];let g=TPL;for(let o=0;o<4;o++){const cells=[];let head=null;
  for(let r=0;r<5;r++)for(let c=0;c<5;c++){const ch=g[r][c];if(ch!=='0'){const cell={dr:r,dc:c,h:ch==='2'};cells.push(cell);if(cell.h)head=cell;}}
  arr.push({cells,head});g=rotCW(g);}return arr;})();
const ONAMES=['机头朝上','机头朝右','机头朝下','机头朝左'];
function planeCells(p){return ORIENTS[p.o].cells.map(x=>({r:p.r+x.dr,c:p.c+x.dc,h:x.h}));}
function headIdx(p){const hd=ORIENTS[p.o].head;return (p.r+hd.dr)*10+(p.c+hd.dc);}
function planeValid(p,others){for(const cell of planeCells(p))if(cell.r<0||cell.r>9||cell.c<0||cell.c>9)return false;
  const hi=headIdx(p);for(const q of others)if(headIdx(q)===hi)return false;return true;}
function randomLayout(existing){const planes=[];const base=existing?existing.slice():[];let guard=0;
  while(planes.length<3-(existing?existing.length:0)){if(++guard>5000)break;
    const p={o:(Math.random()*4)|0,r:(Math.random()*6)|0,c:(Math.random()*6)|0};
    if(planeValid(p,base.concat(planes)))planes.push(p);}
  return (existing||[]).concat(planes);}
function valueMap(planes){const m=new Uint8Array(100);for(const p of planes)for(const cell of planeCells(p)){const i=cell.r*10+cell.c;const v=cell.h?2:1;if(v>m[i])m[i]=v;}return m;}
function headSet(planes){return new Set(planes.map(headIdx));}
function planeAt(orient,i){const hd=ORIENTS[orient].head;return{o:orient,r:((i/10)|0)-hd.dr,c:(i%10)-hd.dc};}

/* ========== 工具 ========== */
const $=s=>document.querySelector(s);
const app=()=>$('#app');
const esc=s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function h(tag,cls,html){const d=document.createElement(tag);if(cls)d.className=cls;if(html!=null)d.innerHTML=html;return d;}
let toastT=null;
function toast(msg){const t=$('#toast');t.textContent=msg;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2600);}
function headerHTML(sub){return '<div class="apphead"><span class="plane">✈️</span><h1>打飞机</h1><span class="sub">'+esc(sub||'局域网天梯')+'</span><span class="spacer"></span></div>';}
function legendHTML(){return '<div class="legend"><span><i class="lg"></i>云</span><span><i class="lg sky"></i>天空</span><span><i class="lg hitb"></i>机身</span><span><i class="lg hith"></i>机头</span></div>';}

function makeBoard(){
  const el=h('div','board');const cells=[];
  for(let i=0;i<100;i++){const d=h('div','cell');d.dataset.i=i;el.appendChild(d);cells.push(d);}
  return{el,cells,clear(){for(const c of cells)c.className='cell';},
    paintSil(planes){if(!planes)return;for(const p of planes)for(const cell of planeCells(p)){
      cells[cell.r*10+cell.c].classList.add(cell.h?'silhead':'sil');}},
    paintShots(shotMap,lastShot=-1,popIdx=-1){if(!shotMap)return;
      for(const [k,r] of Object.entries(shotMap)){const i=+k;const d=cells[i];
        d.classList.add(r==='head'?'hith':r==='body'?'hitb':'sky');
        if(i===popIdx)d.classList.add('pop');if(i===lastShot)d.classList.add('last');}},
    paint({silPlanes,shotMap,lastShot=-1,popIdx=-1}={}){
      this.clear();this.paintSil(silPlanes);this.paintShots(shotMap,lastShot,popIdx);}};
}

/* ========== 状态 ========== */
let ME=null; // {id,name,token}
let CUR=null;
let socket=null;
let ladder=null;
let match=null;
const SCREENS={};
const MP={};

function go(name,arg){
  if(CUR&&SCREENS[CUR].leave)SCREENS[CUR].leave();
  CUR=name;app().innerHTML='';
  SCREENS[name].enter(arg);
}

/* ========== 网络 ========== */
async function apiLogin(name){
  const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name})});
  const j=await r.json();
  if(!j.ok)throw new Error(j.error||'登录失败');
  return j.player;
}

function wsSend(obj){if(socket&&socket.readyState===1)socket.send(JSON.stringify(obj));}

function connectWS(){
  return new Promise((resolve,reject)=>{
    const proto=location.protocol==='https:'?'wss:':'ws:';
    const ws=new WebSocket(proto+'//'+location.host+'/ws');
    socket=ws;
    let done=false;
    ws.onopen=()=>wsSend({type:'auth',token:ME.token});
    ws.onmessage=(ev)=>{
      let msg;try{msg=JSON.parse(ev.data);}catch{return;}
      if(msg.type==='auth_ok'){if(!done){done=true;resolve(msg);}}
      if(msg.type==='error'&&!done){done=true;reject(new Error(msg.error));}
      onMsg(msg);
    };
    ws.onerror=()=>{if(!done){done=true;reject(new Error('连接失败'));}};
    ws.onclose=()=>{
      if(CUR&&CUR!=='home')toast('连接断开，正在重连…');
      setTimeout(()=>{if(ME&&ME.token)connectWS().then(()=>{
        if(CUR==='lobby'||CUR==='place'||CUR==='battle')wsSend({type:'join_ladder'});
        wsSend({type:'sync'});
      }).catch(()=>{});},2000);
    };
  });
}

function onMsg(msg){
  if(msg.type==='ladder_state'){
    ladder=msg;
    if(SCREENS[CUR]&&SCREENS[CUR].onLadder)SCREENS[CUR].onLadder(msg);
  }
  if(msg.type==='match_state'){
    match=msg.match;
    if(SCREENS[CUR]&&SCREENS[CUR].onMatch)SCREENS[CUR].onMatch(msg.match);
  }
  if(msg.type==='shot_result'){
    if(SCREENS[CUR]&&SCREENS[CUR].onShot)SCREENS[CUR].onShot(msg);
  }
  if(msg.type==='place_ok'){
    if(SCREENS[CUR]&&SCREENS[CUR].onPlaceOk)SCREENS[CUR].onPlaceOk();
  }
  if(msg.type==='error')toast(msg.error||'错误');
  if(msg.type==='left_ladder'){/* ok */}
}

/* ========== 首页 ========== */
SCREENS.home={
  enter(){
    const root=app();
    root.appendChild(h('div',null,headerHTML('局域网天梯 · 浏览器直接玩')));
    const card=h('div','card center');
    card.style.maxWidth='460px';card.style.margin='40px auto 0';
    const saved=(localStorage.getItem('fly-name')||'');
    card.innerHTML=
      '<h2 class="sec" style="display:inline-block">飞行员登记</h2>'
      +'<div style="margin:14px 0 6px"><input id="nick" class="nick" maxlength="12" placeholder="写下你的代号" value="'+esc(saved)+'"></div>'
      +'<div class="homebtns">'
      +'<button class="btn" id="btnSingle">单人练习</button>'
      +'<button class="btn red" id="btnLadder">进入天梯</button>'
      +'</div>'
      +'<div class="note" style="margin-top:18px">10×10 藏 3 架飞机，打中 3 个机头获胜。<br>'
      +'天梯：把本页地址发给同一 Wi‑Fi 的朋友即可联机。胜者守擂，败者垫底。<br>'
      +'当前地址：<b class="red-ink">'+esc(location.origin)+'</b></div>';
    root.appendChild(card);
    $('#btnSingle').onclick=async()=>{
      const name=$('#nick').value.trim();
      localStorage.setItem('fly-name',name);
      ME={id:'local',name:name||'飞行员',token:''};
      go('single');
    };
    $('#btnLadder').onclick=async()=>{
      const name=$('#nick').value.trim();
      if(!name){toast('请输入代号');return;}
      localStorage.setItem('fly-name',name);
      try{
        ME=await apiLogin(name);
        await connectWS();
        go('lobby');
      }catch(e){toast('连不上服务器');console.error(e);}
    };
    $('#nick').addEventListener('keydown',e=>{if(e.key==='Enter')$('#btnLadder').click();});
  }
};

/* ========== 单人 ========== */
SCREENS.single={
  st:null,
  enter(){
    const st=this.st={planes:randomLayout(),steps:0,got:0,rev:new Set(),over:false};
    st.map=valueMap(st.planes);st.heads=headSet(st.planes);
    const root=app();
    root.appendChild(h('div',null,headerHTML('单人练习')));
    const wrap=h('div','col');wrap.style.alignItems='center';wrap.style.gap='14px';
    const hud=h('div','hud');
    hud.innerHTML='<span>步数 <b id="spSteps" class="big">0</b></span><span>击落 <b id="spGot" class="big">0</b>/3</span>';
    st.board=makeBoard();
    const bw=h('div','boardwrap');bw.appendChild(st.board.el);
    const btns=h('div','hud');
    btns.innerHTML='<button class="btn ghost sm" id="spBack">返回首页</button><button class="btn sm" id="spRe">重新开始</button>';
    wrap.appendChild(hud);wrap.appendChild(bw);wrap.appendChild(h('div',null,legendHTML()));wrap.appendChild(btns);
    root.appendChild(wrap);
    st.board.el.addEventListener('click',e=>{const t=e.target.closest('.cell');if(!t)return;this.shoot(+t.dataset.i);});
    $('#spBack').onclick=()=>go('home');
    $('#spRe').onclick=()=>go('single');
  },
  shoot(i){
    const st=this.st;if(st.over||st.rev.has(i))return;
    st.rev.add(i);st.steps++;const v=st.map[i];
    st.board.cells[i].classList.add(v===2?'hith':v===1?'hitb':'sky','pop');
    if(v===2)st.got++;
    $('#spSteps').textContent=st.steps;$('#spGot').textContent=st.got;
    if(st.got>=3){st.over=true;this.win();}
  },
  win(){
    const st=this.st;
    for(const p of st.planes)for(const cell of planeCells(p)){
      const i=cell.r*10+cell.c;
      if(!st.rev.has(i))st.board.cells[i].classList.add(cell.h?'silhead':'sil');
    }
    let best=+localStorage.getItem('sp-best')||0;let isNew=false;
    if(!best||st.steps<best){best=st.steps;isNew=true;localStorage.setItem('sp-best',best);}
    const ov=h('div','overlay');
    ov.innerHTML='<div class="card"><h3 class="win">全部击落！</h3>'
      +'<div>本局用了 <b class="red-ink" style="font-size:24px">'+st.steps+'</b> 步'
      +(isNew?'<div class="red-ink">刷新个人纪录！</div>':'<div class="note">个人纪录 '+best+' 步</div>')
      +'</div><div class="hud" style="margin-top:12px"><button class="btn" id="ovAgain">再来一局</button><button class="btn ghost" id="ovHome">返回首页</button></div></div>';
    document.body.appendChild(ov);
    $('#ovAgain').onclick=()=>{ov.remove();go('single');};
    $('#ovHome').onclick=()=>{ov.remove();go('home');};
  },
  leave(){document.querySelectorAll('.overlay').forEach(o=>o.remove());}
};

/* ========== 大厅 ========== */
SCREENS.lobby={
  enter(){
    Object.assign(MP,{specBoards:null,overShown:false});
    const root=app();
    root.appendChild(h('div',null,headerHTML('天梯 · 联机对战')));
    const top=h('div','hud');top.innerHTML='<button class="btn ghost sm" id="lbExit">退出天梯</button>';
    const champ=h('div','card center');champ.id='champCard';champ.style.maxWidth='460px';champ.style.margin='0 auto';
    champ.innerHTML='<div class="champ note">连接中…</div>';
    const status=h('div','statusline');status.id='lbStatus';
    const spec=h('div','row battle');spec.id='specArea';
    const qcard=h('div','card');qcard.style.maxWidth='460px';qcard.style.margin='0 auto';
    qcard.innerHTML='<h2 class="sec">挑战队列</h2><ol class="queue" id="qList"><li class="note">加载中…</li></ol>'
      +'<div class="note">把地址 <b>'+esc(location.origin)+'</b> 发给朋友。前两名开局，其余观战；胜者守擂，败者垫底。</div>';
    const wrap=h('div','col');wrap.style.gap='16px';
    wrap.appendChild(top);wrap.appendChild(champ);wrap.appendChild(status);wrap.appendChild(spec);wrap.appendChild(qcard);
    root.appendChild(wrap);
    $('#lbExit').onclick=()=>{wsSend({type:'leave_ladder'});if(socket)socket.close();go('home');};
    wsSend({type:'join_ladder'});
    wsSend({type:'sync'});
  },
  onLadder(msg){
    if(CUR!=='lobby')return;
    const cc=$('#champCard');if(!cc)return;
    if(msg.champion&&msg.champion.id){
      cc.innerHTML='<div class="champ"><span>🏆</span><span>擂主 · '+esc(msg.champion.name)+'</span>'
        +(msg.streak>1?'<span class="streak">'+msg.streak+' 连胜</span>':'')+'</div>'
        +(msg.you&&msg.you.isChamp?'<div class="red-ink" style="margin-top:6px">你正在守擂，等待挑战者…</div>':'');
    }else cc.innerHTML='<div class="champ"><span>🏆</span><span class="note">擂台虚位以待</span></div>';
    const ql=$('#qList');
    if(msg.queue&&msg.queue.length){
      ql.innerHTML=msg.queue.map(q=>'<li'+(q.id===ME.id?' class="me"':'')+'>'+esc(q.name)+(q.id===ME.id?'（你）':'')+'</li>').join('');
    }else ql.innerHTML='<li class="note">队列空空如也</li>';
    if(!msg.matchId){
      const n=(msg.queue?msg.queue.length:0)+(msg.champion?1:0);
      $('#lbStatus').textContent=n>=2?'正在撮合对局…':'人数不足，等待更多飞行员加入…';
      $('#specArea').innerHTML='';MP.specBoards=null;
    }
  },
  onMatch(m){
    if(CUR!=='lobby')return;
    const inMatch=m.players.some(p=>p.id===ME.id);
    if(inMatch&&m.phase==='place'){go('place');return;}
    if(inMatch&&m.phase==='battle'){go('battle');return;}
    // 观战
    const [P0,P1]=m.players;
    const area=$('#specArea');const st=$('#lbStatus');
    if(m.phase==='place'){
      st.innerHTML='对局：<b>'+esc(P0.name)+'</b> vs <b>'+esc(P1.name)+'</b> —— 双方布阵中…';
      area.innerHTML='';MP.specBoards=null;return;
    }
    if(!MP.specBoards){
      area.innerHTML='';
      MP.specBoards=[makeBoard(),makeBoard()];
      for(const ix of [0,1]){
        const bw=h('div','boardwrap');
        const tt=h('div','boardtitle');tt.id='specT'+ix;
        bw.appendChild(tt);bw.appendChild(MP.specBoards[ix].el);
        MP.specBoards[ix].el.classList.add('locked');
        area.appendChild(bw);
      }
    }
    const shots0=m.boardShots0||{};const shots1=m.boardShots1||{};
    MP.specBoards[0].paint({shotMap:shots0});
    MP.specBoards[1].paint({shotMap:shots1});
    if(m.phase==='over'&&m.reveal){
      MP.specBoards[0].paint({silPlanes:m.reveal[P0.id],shotMap:shots0});
      MP.specBoards[1].paint({silPlanes:m.reveal[P1.id],shotMap:shots1});
    }
    const k0=(m.killed&&m.killed[P1.id])||0;
    const k1=(m.killed&&m.killed[P0.id])||0;
    const t0=$('#specT0'),t1=$('#specT1');
    if(t0)t0.innerHTML='<span class="who">'+esc(P0.name)+'</span><span class="note">被击落 '+k0+'/3</span>';
    if(t1)t1.innerHTML='<span class="who">'+esc(P1.name)+'</span><span class="note">被击落 '+k1+'/3</span>';
    if(m.phase==='over'){
      const w=m.players.find(p=>p.id===m.winner);
      st.innerHTML='<span class="red-ink" style="font-size:17px">'+esc(w?w.name:'?')+' 获胜！</span>（'+esc(m.reason||'')+'）即将开始新对局…';
    }else{
      const tp=m.players.find(p=>p.id===m.turn);
      st.innerHTML='观战中 · 轮到 <b>'+esc(tp?tp.name:'')+'</b>';
    }
  },
  leave(){}
};

/* ========== 布阵 ========== */
SCREENS.place={
  enter(){
    Object.assign(MP,{localPlanes:[],orient:0,preview:null,submitted:false,autoDone:false});
    const root=app();
    const opp=match?match.players.find(p=>p.id!==ME.id):null;
    root.appendChild(h('div',null,headerHTML('布阵 · 对手：'+(opp?opp.name:'?'))));
    const wrap=h('div','row');
    const bw=h('div','boardwrap');
    bw.innerHTML='<div class="boardtitle"><span class="who">我的阵地</span></div>';
    MP.board=makeBoard();bw.appendChild(MP.board.el);
    const panel=h('div','card col');panel.style.minWidth='240px';
    panel.innerHTML='<h2 class="sec">部署 3 架飞机</h2>'
      +'<div class="hud" style="justify-content:flex-start"><span>剩余</span><b id="plTimer" class="big timer">60</b><span>秒</span></div>'
      +'<div class="hud" style="justify-content:flex-start"><span>已部署</span><b id="plCount" class="big">0</b>/3</div>'
      +'<div><div class="note">朝向：<span id="plOri">'+ONAMES[0]+'</span>（R 旋转）</div><div class="mini" id="plMini"></div></div>'
      +'<div class="hud" style="justify-content:flex-start;gap:8px">'
      +'<button class="btn sm" id="plRot">旋转</button>'
      +'<button class="btn ghost sm" id="plUndo">撤销</button>'
      +'<button class="btn ghost sm" id="plClear">清空</button>'
      +'<button class="btn ghost sm" id="plRand">随机</button></div>'
      +'<button class="btn red" id="plOk" disabled>确认出击</button>'
      +'<div class="note" id="plStat">点击棋盘放置（机头锚定）。可重叠，机头不能同格。</div>';
    wrap.appendChild(bw);wrap.appendChild(panel);root.appendChild(wrap);
    this.drawMini();this.redraw();
    MP.board.el.addEventListener('mousemove',e=>{
      if(MP.submitted)return;const t=e.target.closest('.cell');if(!t)return;this.setPreview(+t.dataset.i);
    });
    MP.board.el.addEventListener('mouseleave',()=>{if(!MP.submitted){MP.preview=null;this.redraw();}});
    MP.board.el.addEventListener('click',e=>{
      if(MP.submitted)return;const t=e.target.closest('.cell');if(!t)return;
      const i=+t.dataset.i;const hoverable=matchMedia('(hover:hover)').matches;
      if(hoverable){this.setPreview(i);this.tryPlace(i);}
      else{if(MP.preview===i)this.tryPlace(i);else this.setPreview(i);}
    });
    $('#plRot').onclick=()=>this.rotate();
    this.keyH=e=>{if(e.key==='r'||e.key==='R')this.rotate();};
    document.addEventListener('keydown',this.keyH);
    $('#plUndo').onclick=()=>{if(!MP.submitted&&MP.localPlanes.length){MP.localPlanes.pop();this.redraw();}};
    $('#plClear').onclick=()=>{if(!MP.submitted){MP.localPlanes=[];this.redraw();}};
    $('#plRand').onclick=()=>{if(!MP.submitted){MP.localPlanes=randomLayout();this.redraw();}};
    $('#plOk').onclick=()=>this.confirm();
    this.secIv=setInterval(()=>this.sec(),500);
    if(match)this.onMatch(match);
  },
  rotate(){if(MP.submitted)return;MP.orient=(MP.orient+1)%4;$('#plOri').textContent=ONAMES[MP.orient];this.drawMini();this.redraw();},
  drawMini(){const m=$('#plMini');if(!m)return;m.innerHTML='';
    const g=Array.from({length:25},()=>h('i'));
    for(const cell of ORIENTS[MP.orient].cells)g[cell.dr*5+cell.dc].className=cell.h?'h':'b';
    g.forEach(x=>m.appendChild(x));},
  setPreview(i){MP.preview=i;this.redraw();},
  tryPlace(i){
    if(MP.localPlanes.length>=3){toast('已放满 3 架');return;}
    const p=planeAt(MP.orient,i);
    if(!planeValid(p,MP.localPlanes))return;
    MP.localPlanes.push(p);this.redraw();
  },
  redraw(){
    if(CUR!=='place')return;
    MP.board.paint({silPlanes:MP.localPlanes});
    if(MP.preview!=null&&!MP.submitted&&MP.localPlanes.length<3){
      const p=planeAt(MP.orient,MP.preview);
      const ok=planeValid(p,MP.localPlanes);
      for(const cell of planeCells(p)){
        if(cell.r<0||cell.r>9||cell.c<0||cell.c>9)continue;
        MP.board.cells[cell.r*10+cell.c].classList.add(ok?'pvok':'pvbad');
      }
    }
    const cnt=$('#plCount');if(cnt)cnt.textContent=MP.localPlanes.length;
    const ok=$('#plOk');if(ok)ok.disabled=!(MP.localPlanes.length===3)||MP.submitted;
  },
  confirm(){
    if(MP.submitted||MP.localPlanes.length!==3)return;
    MP.submitted=true;MP.board.el.classList.add('locked');
    $('#plOk').disabled=true;
    $('#plStat').innerHTML='<span class="red-ink">阵型已锁定，等待对手…</span>';
    wsSend({type:'place',planes:MP.localPlanes});
  },
  onPlaceOk(){
    MP.submitted=true;
    $('#plStat').innerHTML='<span class="red-ink">阵型已锁定，等待对手…</span>';
  },
  onMatch(m){
    if(CUR!=='place')return;
    if(m.phase==='battle'){go('battle');return;}
    if(m.phase==='over'){toast(m.winner===ME.id?'对手离场，你获胜':'对局结束');go('lobby');return;}
    if(m.myLayout&&!MP.submitted){
      MP.localPlanes=m.myLayout;MP.submitted=true;MP.board.el.classList.add('locked');this.redraw();
    }
    const opp=m.players.find(p=>p.id!==ME.id);
    const oppReady=opp&&m.submitted&&m.submitted[opp.id];
    const stat=$('#plStat');
    if(stat&&MP.submitted)stat.innerHTML=oppReady?'<span class="red-ink">双方就绪，进入对局！</span>':'<span class="red-ink">阵型已锁定，等待对手…</span>';
    else if(stat&&oppReady)stat.innerHTML='对手已就绪，等你部署。';
    MP.placeEnd=m.placeEnd;
  },
  sec(){
    const el=$('#plTimer');if(!el||!MP.placeEnd)return;
    const left=Math.max(0,Math.ceil((MP.placeEnd-Date.now())/1000));
    el.textContent=left;el.classList.toggle('urgent',left<=10);
    if(left<=0&&!MP.submitted&&!MP.autoDone){
      MP.autoDone=true;MP.localPlanes=randomLayout(MP.localPlanes);this.redraw();
      toast('布阵超时，已随机补全');this.confirm();
    }
  },
  leave(){if(this.keyH)document.removeEventListener('keydown',this.keyH);if(this.secIv)clearInterval(this.secIv);}
};

/* ========== 对战 ========== */
SCREENS.battle={
  enter(){
    Object.assign(MP,{overShown:false,busyFire:false});
    const root=app();
    const opp=match?match.players.find(p=>p.id!==ME.id):null;
    root.appendChild(h('div',null,headerHTML('对局 · '+((opp&&opp.name)||'?'))));
    const banner=h('div','turnbanner');banner.id='btBanner';
    const hud=h('div','hud');
    hud.innerHTML='<span>我击落 <b id="btMy" class="big">0</b>/3</span>'
      +'<span>对方击落 <b id="btOp" class="big">0</b>/3</span>'
      +'<span>倒计时 <b id="btTimer" class="big timer">60</b>s</span>'
      +'<span class="note" id="btTos"></span>';
    const row=h('div','row battle');
    MP.mineB=makeBoard();MP.mineB.el.classList.add('locked');
    MP.enemyB=makeBoard();
    const bw1=h('div','boardwrap');bw1.innerHTML='<div class="boardtitle" id="btT0"><span class="who">我的阵地</span></div>';bw1.appendChild(MP.mineB.el);
    const bw2=h('div','boardwrap');bw2.innerHTML='<div class="boardtitle" id="btT1"><span class="who">敌方空域</span></div>';bw2.appendChild(MP.enemyB.el);
    row.appendChild(bw1);row.appendChild(bw2);
    const foot=h('div','col');foot.style.alignItems='center';foot.style.gap='8px';
    foot.appendChild(h('div',null,legendHTML()));
    foot.appendChild(h('div',null,'<button class="btn ghost sm" id="btQuit">认输退出</button>'));
    const wrap=h('div','col');wrap.style.gap='12px';
    wrap.appendChild(banner);wrap.appendChild(hud);wrap.appendChild(row);wrap.appendChild(foot);
    root.appendChild(wrap);
    MP.enemyB.el.addEventListener('click',e=>{
      const t=e.target.closest('.cell');if(!t)return;this.fire(+t.dataset.i);
    });
    $('#btQuit').onclick=()=>{if(confirm('确定认输并退出？')){wsSend({type:'surrender'});wsSend({type:'leave_ladder'});if(socket)socket.close();go('home');}};
    this.secIv=setInterval(()=>this.sec(),500);
    if(match)this.onMatch(match);
  },
  fire(i){
    const m=match;if(!m||m.phase!=='battle'||m.turn!==ME.id||MP.busyFire)return;
    if(m.shotResults&&m.shotResults[i]!=null)return;
    MP.busyFire=true;
    wsSend({type:'fire',i});
    setTimeout(()=>{MP.busyFire=false;},400);
  },
  onShot(msg){
    if(msg.by===ME.id&&MP.enemyB)MP.enemyB.cells[msg.i].classList.add('pop');
    else if(MP.mineB&&msg.i!=null)MP.mineB.cells[msg.i].classList.add('pop');
  },
  onMatch(m){
    if(CUR!=='battle')return;
    if(m.phase==='place'){go('place');return;}
    if(!m.players.some(p=>p.id===ME.id)){go('lobby');return;}
    const opp=m.players.find(p=>p.id!==ME.id);
    const myTurn=m.phase==='battle'&&m.turn===ME.id;
    MP.mineB.paint({silPlanes:m.myLayout,shotMap:m.boardShots,
      lastShot:m.oppShots&&m.oppShots.length?m.oppShots[m.oppShots.length-1]:-1});
    let enemyMap=m.shotResults||{};
    let sil=null;
    if(m.phase==='over'&&m.reveal&&opp)sil=m.reveal[opp.id];
    MP.enemyB.paint({silPlanes:sil,shotMap:enemyMap,
      lastShot:m.myShots&&m.myShots.length?m.myShots[m.myShots.length-1]:-1});
    MP.enemyB.el.classList.toggle('locked',!myTurn);
    $('#btMy').textContent=(m.killed&&m.killed[ME.id])||0;
    $('#btOp').textContent=(opp&&m.killed&&m.killed[opp.id])||0;
    $('#btT0').className='boardtitle'+(m.turn===opp.id&&m.phase==='battle'?' active':'');
    $('#btT1').className='boardtitle'+(myTurn?' active':'');
    const bn=$('#btBanner');
    if(m.phase==='battle')bn.innerHTML=myTurn?'<span class="t">轮到你开火</span> —— 点击敌方空域':'等待 <span class="t">'+esc(opp?opp.name:'')+'</span> 行动…';
    const myTos=(m.tos&&m.tos[ME.id])||0,opTos=(opp&&m.tos&&m.tos[opp.id])||0;
    $('#btTos').textContent=(myTos||opTos)?('超时 你'+myTos+'/3 · 对方'+opTos+'/3'):'';
    MP.turnEnd=m.turnEnd;
    if(m.phase==='over')this.onOver(m);
  },
  sec(){
    const el=$('#btTimer');if(!el||!MP.turnEnd)return;
    const left=Math.max(0,Math.ceil((MP.turnEnd-Date.now())/1000));
    el.textContent=left;el.classList.toggle('urgent',left<=10);
  },
  onOver(m){
    if(MP.overShown)return;MP.overShown=true;
    const win=m.winner===ME.id;
    const ov=h('div','overlay');
    ov.innerHTML='<div class="card"><h3 class="'+(win?'win':'lose')+'">'+(win?'胜利！':'落败')+'</h3>'
      +'<div>'+esc(m.reason||'')+'</div>'
      +'<div class="note" style="margin-top:8px">'+(win?'你将守擂迎接下一位':'你已回到队列末尾')+'</div>'
      +'<div class="note" id="ovCnt" style="margin-top:6px">4 秒后返回大厅…</div></div>';
    document.body.appendChild(ov);
    let n=4;
    const iv=setInterval(()=>{n--;const c=$('#ovCnt');if(c)c.textContent=n+' 秒后返回大厅…';
      if(n<=0){clearInterval(iv);ov.remove();if(CUR==='battle')go('lobby');}},1000);
  },
  leave(){if(this.secIv)clearInterval(this.secIv);document.querySelectorAll('.overlay').forEach(o=>o.remove());}
};

/* ========== 启动 ========== */
go('home');
setInterval(()=>{if(socket&&socket.readyState===1)wsSend({type:'ping'});},5000);
</script>
