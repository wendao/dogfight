<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>打飞机 · 方格纸空战</title>
<style>
:root{
  --paper:#f6f2e7;
  --card:#fffdf6;
  --line:#e3dcc6;
  --grid:#c6d4e6;
  --ink:#22395c;
  --ink-soft:#5c6f8c;
  --sky:#5fa9dd;
  --hit:#3d9463;
  --head:#d23b34;
  --pen:#c0392b;
  --muted:#8d8672;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;padding:0}
body{
  min-height:100vh;
  background:var(--paper);
  background-image:
    linear-gradient(var(--line) 1px, transparent 1px),
    linear-gradient(90deg, var(--line) 1px, transparent 1px);
  background-size:26px 26px;
  color:var(--ink);
  font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei","Noto Sans SC",sans-serif;
  font-size:15px;
}
.kai{font-family:"Kaiti SC","KaiTi","STKaiti","Kaiti","PingFang SC",serif}
#app{max-width:1020px;margin:0 auto;padding:20px 14px 60px}

/* ---------- header ---------- */
.apphead{display:flex;align-items:baseline;gap:14px;flex-wrap:wrap;margin:6px 0 20px}
.apphead h1{
  font-family:"Kaiti SC","KaiTi","STKaiti",serif;
  font-size:34px;margin:0;letter-spacing:6px;
  border-bottom:3px double var(--pen);padding-bottom:4px;
}
.apphead .plane{font-size:24px;transform:rotate(-12deg);display:inline-block}
.apphead .sub{color:var(--muted);font-size:13px}
.apphead .spacer{flex:1}

/* ---------- cards & layout ---------- */
.card{
  background:var(--card);
  border:1px solid #e0d8bf;
  border-radius:10px;
  box-shadow:0 2px 0 rgba(34,57,92,.07);
  padding:16px 18px;
}
.row{display:flex;gap:18px;flex-wrap:wrap;justify-content:center;align-items:flex-start}
.col{display:flex;flex-direction:column;gap:12px}
.center{text-align:center}
h2.sec{
  font-family:"Kaiti SC","KaiTi","STKaiti",serif;
  font-size:20px;margin:0 0 10px;letter-spacing:2px;
}
h2.sec::after{content:"";display:block;width:46px;height:3px;background:var(--pen);margin-top:4px;border-radius:2px}
.note{color:var(--muted);font-size:13px;line-height:1.7}
.red-ink{color:var(--pen);font-family:"Kaiti SC","KaiTi","STKaiti",serif}

/* ---------- buttons & inputs ---------- */
.btn{
  appearance:none;border:1.5px solid var(--ink);border-radius:7px;
  background:var(--ink);color:#fdfaf2;
  font-size:15px;padding:9px 20px;cursor:pointer;
  font-family:inherit;letter-spacing:1px;
  transition:transform .06s, box-shadow .06s;
}
.btn:hover{box-shadow:0 2px 0 rgba(34,57,92,.35)}
.btn:active{transform:translateY(1px);box-shadow:none}
.btn.ghost{background:transparent;color:var(--ink)}
.btn.red{background:var(--pen);border-color:var(--pen)}
.btn.sm{font-size:13px;padding:6px 12px}
.btn:disabled{opacity:.45;cursor:not-allowed;box-shadow:none;transform:none}
.btn:focus-visible,input:focus-visible{outline:2px solid var(--pen);outline-offset:2px}
input.nick{
  border:none;border-bottom:2px solid var(--ink);background:transparent;
  font-size:18px;padding:6px 4px;width:200px;text-align:center;
  font-family:"Kaiti SC","KaiTi","STKaiti",serif;letter-spacing:2px;color:var(--ink);
}
input.nick::placeholder{color:#b8b19a}

/* ---------- board ---------- */
.boardwrap{display:flex;flex-direction:column;gap:8px;align-items:center}
.boardtitle{font-size:14px;letter-spacing:1px;display:flex;gap:8px;align-items:center}
.boardtitle .who{font-family:"Kaiti SC","KaiTi","STKaiti",serif;font-size:17px}
.boardtitle.active .who{border-bottom:3px solid var(--pen)}
.board{
  display:grid;grid-template-columns:repeat(10,1fr);
  width:min(92vw,380px);aspect-ratio:1;
  background:#fff;border:2px solid var(--ink);border-radius:4px;
  user-select:none;touch-action:manipulation;
}
.cell{position:relative;border:1px solid var(--grid);cursor:pointer;background:#fff}
.board.locked .cell{cursor:default}
.cell.sky{background:var(--sky)}
.cell.sil{background:#dde4ee}
.cell.silhead{background:#c4d0e3}
.cell.silhead::before{
  content:"";position:absolute;inset:24%;
  clip-path:polygon(50% 4%,96% 90%,4% 90%);
  background:transparent;border:0;box-shadow:inset 0 0 0 100px rgba(34,57,92,.45);
}
.cell.hitb::after{
  content:"";position:absolute;inset:22%;border-radius:50%;background:var(--hit);
}
.cell.hith::after{
  content:"";position:absolute;inset:14%;
  clip-path:polygon(50% 4%,96% 90%,4% 90%);background:var(--head);
}
.cell.pop::after{animation:stamp .22s ease-out}
.cell.pop.sky{animation:fadein .25s ease-out}
@keyframes stamp{0%{transform:scale(1.7);opacity:0}70%{transform:scale(.92)}100%{transform:scale(1);opacity:1}}
@keyframes fadein{from{opacity:.2}to{opacity:1}}
.cell.last{box-shadow:inset 0 0 0 2.5px var(--pen)}
.cell.pvok{box-shadow:inset 0 0 0 100px rgba(61,148,99,.38)}
.cell.pvbad{box-shadow:inset 0 0 0 100px rgba(210,59,52,.38)}
@media (hover:hover){ .board:not(.locked) .cell:hover{box-shadow:inset 0 0 0 100px rgba(34,57,92,.10)} }

/* ---------- hud ---------- */
.hud{display:flex;gap:18px;align-items:center;justify-content:center;flex-wrap:wrap;font-size:15px}
.hud .big{font-family:"Kaiti SC","KaiTi","STKaiti",serif;font-size:22px;color:var(--pen)}
.turnbanner{
  text-align:center;font-family:"Kaiti SC","KaiTi","STKaiti",serif;
  font-size:19px;letter-spacing:2px;margin:2px 0;
}
.turnbanner .t{color:var(--pen)}
.timer{font-variant-numeric:tabular-nums}
.timer.urgent{color:var(--pen);font-weight:700}

/* ---------- legend ---------- */
.legend{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;font-size:13px;color:var(--ink-soft)}
.legend span{display:inline-flex;align-items:center;gap:5px}
.lg{width:15px;height:15px;border:1px solid var(--grid);display:inline-block;position:relative;background:#fff}
.lg.sky{background:var(--sky)}
.lg.hitb::after{content:"";position:absolute;inset:20%;border-radius:50%;background:var(--hit)}
.lg.hith::after{content:"";position:absolute;inset:12%;clip-path:polygon(50% 4%,96% 90%,4% 90%);background:var(--head)}

/* ---------- mini preview ---------- */
.mini{display:grid;grid-template-columns:repeat(5,16px);grid-auto-rows:16px;gap:1px;background:#e8e2d0;border:1px solid #d9d2ba;width:max-content;padding:1px}
.mini i{background:#fff;display:block}
.mini i.b{background:#8fa5c4}
.mini i.h{background:var(--head)}

/* ---------- lists ---------- */
ol.queue{margin:6px 0;padding-left:24px;line-height:1.9}
ol.queue li.me{color:var(--pen);font-weight:700}
table.lb{border-collapse:collapse;margin:8px auto;font-size:14px;min-width:240px}
table.lb td,table.lb th{border-bottom:1px dashed #d8d0b8;padding:5px 14px;text-align:left}
table.lb th{font-weight:400;color:var(--muted);font-size:12px}
table.lb tr.me td{color:var(--pen);font-weight:700}

/* ---------- champion ---------- */
.champ{
  display:flex;align-items:center;gap:10px;justify-content:center;
  font-family:"Kaiti SC","KaiTi","STKaiti",serif;font-size:19px;letter-spacing:1px;
}
.champ .crown{font-size:22px}
.champ .streak{font-size:14px;color:var(--pen);border:1px solid var(--pen);border-radius:20px;padding:1px 10px}

/* ---------- overlay ---------- */
.overlay{
  position:fixed;inset:0;background:rgba(60,52,32,.45);
  display:flex;align-items:center;justify-content:center;z-index:50;padding:16px;
}
.overlay .card{max-width:420px;width:100%;text-align:center;animation:drop .25s ease-out}
@keyframes drop{from{transform:translateY(-14px);opacity:0}}
.overlay h3{font-family:"Kaiti SC","KaiTi","STKaiti",serif;font-size:26px;margin:4px 0 8px;letter-spacing:3px}
.overlay h3.win{color:var(--pen)}
.overlay h3.lose{color:var(--ink-soft)}

/* ---------- toast ---------- */
#toast{
  position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
  background:var(--ink);color:#fdfaf2;padding:9px 20px;border-radius:8px;
  opacity:0;pointer-events:none;transition:all .25s;z-index:99;font-size:14px;max-width:90vw;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

.statusline{text-align:center;color:var(--ink-soft);font-size:14px;min-height:20px}
.homebtns{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:18px}
.homebtns .btn{font-size:17px;padding:13px 34px;letter-spacing:3px;font-family:"Kaiti SC","KaiTi","STKaiti",serif}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
@media (max-width:820px){ .row.battle{flex-direction:column;align-items:center} }
</style>
</head>
<body>
<div id="app"></div>
<div id="toast"></div>
<script>
'use strict';
/* ================= 基础工具 ================= */
const CFG = { PLACE_MS:60000, TURN_MS:60000, GRACE:5000, HB_MS:6000, STALE:20000, DEAD:30000 };
const K = {
  ladder:'v1-ladder', splb:'v1-splb',
  hb:id=>'v1-hb-'+id,
  m:id=>'v1-m-'+id,
  L:(id,ix)=>'v1-m-'+id+'-L'+ix
};
const $ = s=>document.querySelector(s);
const app = ()=>$('#app');
const uid = ()=> (crypto.randomUUID ? crypto.randomUUID().slice(0,8) : Math.random().toString(36).slice(2,10));
const hash = s=>{ let a=0; for(const ch of s) a=(a+ch.charCodeAt(0))|0; return Math.abs(a); };
const esc = s=>String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function h(tag, cls, html){ const d=document.createElement(tag); if(cls)d.className=cls; if(html!=null)d.innerHTML=html; return d; }
let toastT=null;
function toast(msg){ const t=$('#toast'); t.textContent=msg; t.classList.add('show'); clearTimeout(toastT); toastT=setTimeout(()=>t.classList.remove('show'),2600); }

const store = {
  async get(k, shared=false){ try{ const r=await window.storage.get(k, shared); return r?JSON.parse(r.value):null; }catch(e){ return null; } },
  async set(k,v,shared=false){ try{ const r=await window.storage.set(k, JSON.stringify(v), shared); return !!r; }catch(e){ console.error('set fail',k,e); return false; } },
  async del(k,shared=false){ try{ await window.storage.delete(k, shared); }catch(e){} }
};

/* ================= 飞机几何 =================
   模板（机头朝上）：
   00200
   11111
   00100
   00100
   01110
   2=机头 1=机身 0=空，共 11 格。四个朝向的包围盒均为 5x5。 */
const TPL = ['00200','11111','00100','00100','01110'];
function rotCW(g){ const out=[]; for(let r=0;r<5;r++){ let row=''; for(let c=0;c<5;c++) row+=g[4-c][r]; out.push(row);} return out; }
const ORIENTS = (()=>{ const arr=[]; let g=TPL;
  for(let o=0;o<4;o++){ const cells=[]; let head=null;
    for(let r=0;r<5;r++)for(let c=0;c<5;c++){ const ch=g[r][c];
      if(ch!=='0'){ const cell={dr:r,dc:c,h:ch==='2'}; cells.push(cell); if(cell.h) head=cell; } }
    arr.push({cells, head}); g=rotCW(g); }
  return arr; })();
const ONAMES = ['机头朝上','机头朝右','机头朝下','机头朝左'];

function planeCells(p){ return ORIENTS[p.o].cells.map(x=>({r:p.r+x.dr, c:p.c+x.dc, h:x.h})); }
function headIdx(p){ const hd=ORIENTS[p.o].head; return (p.r+hd.dr)*10 + (p.c+hd.dc); }
function planeValid(p, others){
  for(const cell of planeCells(p)) if(cell.r<0||cell.r>9||cell.c<0||cell.c>9) return false;
  const hi=headIdx(p);
  for(const q of others) if(headIdx(q)===hi) return false;   // 机头不可与机头同格
  return true;
}
function randomLayout(existing){
  const planes=[]; const base=existing?existing.slice():[];
  let guard=0;
  while(planes.length<3-(existing?existing.length:0)){
    if(++guard>5000) break;
    const p={o:(Math.random()*4)|0, r:(Math.random()*6)|0, c:(Math.random()*6)|0};
    if(planeValid(p, base.concat(planes))) planes.push(p);
  }
  return (existing?existing:[]).concat(planes);
}
function valueMap(planes){
  const m=new Uint8Array(100);
  for(const p of planes) for(const cell of planeCells(p)){
    const i=cell.r*10+cell.c; const v=cell.h?2:1; if(v>m[i]) m[i]=v;
  }
  return m;
}
function headSet(planes){ return new Set(planes.map(headIdx)); }

/* ================= 棋盘组件 ================= */
function makeBoard(){
  const el=h('div','board');
  const cells=[];
  for(let i=0;i<100;i++){ const d=h('div','cell'); d.dataset.i=i; el.appendChild(d); cells.push(d); }
  return {
    el, cells,
    clear(){ for(const c of cells){ c.className='cell'; } },
    /* 在棋盘上绘制：silPlanes=显示轮廓的己方飞机；map=该棋盘布局的值表；
       shots=已打击格 idx 数组；lastShot=最近一格 */
    paint({silPlanes=null, map=null, shots=null, lastShot=-1, popIdx=-1}={}){
      this.clear();
      if(silPlanes) for(const p of silPlanes) for(const cell of planeCells(p)){
        const d=cells[cell.r*10+cell.c]; d.classList.add(cell.h?'silhead':'sil');
      }
      if(shots && map) for(const i of shots){
        const d=cells[i]; const v=map[i];
        d.classList.add(v===2?'hith':v===1?'hitb':'sky');
        if(i===popIdx) d.classList.add('pop');
        if(i===lastShot) d.classList.add('last');
      }
    }
  };
}
function legendHTML(){
  return '<div class="legend">'
    +'<span><i class="lg"></i>云（未知）</span>'
    +'<span><i class="lg sky"></i>天空（打空）</span>'
    +'<span><i class="lg hitb"></i>机身机翼</span>'
    +'<span><i class="lg hith"></i>机头</span>'
    +'</div>';
}
function headerHTML(sub){
  return '<div class="apphead"><span class="plane">\u2708\uFE0F</span><h1>打飞机</h1>'
    +'<span class="sub">'+esc(sub||'方格纸上的空战')+'</span><span class="spacer"></span></div>';
}

/* ================= 全局状态 & 屏幕框架 ================= */
let ME = null;                 // {id, name}
let CUR = null;                // 当前屏幕名
let pollBusy=false, lastHb=0;
const MP = {};                 // 天梯运行态

const SCREENS = {};
function go(name, arg){
  if(CUR && SCREENS[CUR].leave) SCREENS[CUR].leave();
  CUR=name; app().innerHTML='';
  SCREENS[name].enter(arg);
}
async function hb(){
  const now=Date.now();
  if(now-lastHb < CFG.HB_MS) return;
  lastHb=now;
  await store.set(K.hb(ME.id), {n:ME.name, t:now}, true);
}
async function loadProfile(){
  let p=await store.get('profile');
  if(!p || !p.id){ p={id:uid(), name:''}; }
  ME=p;
}
async function saveName(name){
  ME.name=(name||'').trim().slice(0,12) || ('玩家'+ME.id.slice(0,4));
  await store.set('profile', ME);
}

/* ================= 首页 ================= */
SCREENS.home = {
  enter(){
    const root=app();
    root.appendChild(h('div',null,headerHTML()));
    const card=h('div','card center');
    card.style.maxWidth='460px'; card.style.margin='40px auto 0';
    card.innerHTML =
      '<h2 class="sec" style="display:inline-block">飞行员登记</h2>'
      +'<div style="margin:14px 0 6px"><input id="nick" class="nick" maxlength="12" placeholder="写下你的代号" value="'+esc(ME.name||'')+'"></div>'
      +'<div class="homebtns">'
      +'<button class="btn" id="btnSingle">单人练习</button>'
      +'<button class="btn red" id="btnLadder">进入天梯</button>'
      +'</div>'
      +'<div class="note" style="margin-top:18px">10×10 方格里藏着 3 架飞机，蓝色是天空，绿圆是机身机翼，红三角是机头。<br>集齐 3 个红三角即获胜。天梯为异地联机：把本页链接发给朋友即可对战。</div>'
      +'<div id="homelb" style="margin-top:14px"></div>';
    root.appendChild(card);
    $('#btnSingle').onclick=async()=>{ await saveName($('#nick').value); go('single'); };
    $('#btnLadder').onclick=async()=>{ await saveName($('#nick').value); go('lobby'); };
    $('#nick').addEventListener('keydown',e=>{ if(e.key==='Enter') $('#btnSingle').click(); });
    this.loadLb();
  },
  async loadLb(){
    const best=await store.get('sp-best');
    const lb=await store.get(K.splb, true);
    let html='';
    if(best) html+='<div class="red-ink">个人最少步数纪录：'+best+' 步</div>';
    if(lb && lb.length){
      html+='<table class="lb"><tr><th>#</th><th>全服单人榜</th><th>步数</th></tr>';
      lb.slice(0,5).forEach((r,i)=>{ html+='<tr'+(r.n===ME.name?' class="me"':'')+'><td>'+(i+1)+'</td><td>'+esc(r.n)+'</td><td>'+r.s+'</td></tr>'; });
      html+='</table>';
    }
    const el=$('#homelb'); if(el) el.innerHTML=html;
  }
};

/* ================= 单人模式 ================= */
SCREENS.single = {
  st:null,
  enter(){
    const st=this.st={ planes:randomLayout(), steps:0, got:0, rev:new Set(), over:false };
    st.map=valueMap(st.planes); st.heads=headSet(st.planes);
    const root=app();
    root.appendChild(h('div',null,headerHTML('单人练习')));
    const wrap=h('div','col'); wrap.style.alignItems='center'; wrap.style.gap='14px';
    const hud=h('div','hud');
    hud.innerHTML='<span>步数 <b id="spSteps" class="big">0</b></span><span>击落 <b id="spGot" class="big">0</b>/3</span>';
    const bw=h('div','boardwrap');
    st.board=makeBoard();
    bw.appendChild(st.board.el);
    const btns=h('div','hud');
    btns.innerHTML='<button class="btn ghost sm" id="spBack">返回首页</button><button class="btn sm" id="spRe">重新开始</button>';
    wrap.appendChild(hud); wrap.appendChild(bw);
    wrap.appendChild(h('div',null,legendHTML()));
    wrap.appendChild(btns);
    root.appendChild(wrap);
    st.board.el.addEventListener('click',e=>{
      const t=e.target.closest('.cell'); if(!t) return;
      this.shoot(+t.dataset.i);
    });
    $('#spBack').onclick=()=>go('home');
    $('#spRe').onclick=()=>go('single');
  },
  shoot(i){
    const st=this.st;
    if(st.over || st.rev.has(i)) return;
    st.rev.add(i); st.steps++;
    const v=st.map[i];
    const d=st.board.cells[i];
    d.classList.add(v===2?'hith':v===1?'hitb':'sky','pop');
    if(v===2) st.got++;
    $('#spSteps').textContent=st.steps;
    $('#spGot').textContent=st.got;
    if(st.got>=3){ st.over=true; this.win(); }
  },
  async win(){
    const st=this.st;
    // 揭示全部飞机轮廓（局已结束，供复盘）
    for(const p of st.planes) for(const cell of planeCells(p)){
      const i=cell.r*10+cell.c;
      if(!st.rev.has(i)) st.board.cells[i].classList.add(cell.h?'silhead':'sil');
    }
    let best=await store.get('sp-best');
    let isNew=false;
    if(!best || st.steps<best){ best=st.steps; isNew=true; await store.set('sp-best',best); }
    // 全服榜
    let lb=await store.get(K.splb,true) || [];
    lb.push({n:ME.name, s:st.steps, t:Date.now()});
    lb.sort((a,b)=>a.s-b.s || a.t-b.t);
    lb=lb.slice(0,10);
    await store.set(K.splb, lb, true);
    const ov=h('div','overlay');
    let rows=''; lb.forEach((r,k)=>{ rows+='<tr'+(r.n===ME.name&&r.s===st.steps?' class="me"':'')+'><td>'+(k+1)+'</td><td>'+esc(r.n)+'</td><td>'+r.s+'</td></tr>'; });
    ov.innerHTML='<div class="card"><h3 class="win kai">全部击落！</h3>'
      +'<div style="font-size:17px">本局用了 <b class="red-ink" style="font-size:24px">'+st.steps+'</b> 步'
      +(isNew?'<div class="red-ink" style="margin-top:4px">✿ 刷新个人纪录！</div>':'<div class="note">个人纪录 '+best+' 步</div>')
      +'</div><table class="lb"><tr><th>#</th><th>全服单人榜</th><th>步数</th></tr>'+rows+'</table>'
      +'<div class="hud" style="margin-top:8px"><button class="btn" id="ovAgain">再来一局</button><button class="btn ghost" id="ovHome">返回首页</button></div></div>';
    document.body.appendChild(ov);
    $('#ovAgain').onclick=()=>{ ov.remove(); go('single'); };
    $('#ovHome').onclick=()=>{ ov.remove(); go('home'); };
  },
  leave(){ document.querySelectorAll('.overlay').forEach(o=>o.remove()); }
};

/* ================= 天梯：公共 ================= */
function resetMP(){
  Object.assign(MP,{ ladder:null, match:null, matchId:null, myIdx:-1, opp:null,
    layouts:{}, specBoards:null, pruneTick:0,
    localPlanes:[], orient:0, preview:null, submitted:false, autoDone:false,
    finalized:false, overShown:false, busyFire:false });
}
function defaultLadder(){ return {championId:null,championName:'',streak:0,queue:[],matchId:null,lastMatchId:null}; }

async function finalizeMatch(match){
  const lad=await store.get(K.ladder,true);
  if(!lad || lad.matchId!==match.id) return;      // 已被处理
  const w=match.players.find(p=>p.id===match.winner);
  const l=match.players.find(p=>p.id!==match.winner);
  if(w){
    lad.streak = (lad.championId===w.id) ? (lad.streak||0)+1 : 1;
    lad.championId=w.id; lad.championName=w.name;
    lad.queue=lad.queue.filter(q=>q.id!==w.id && q.id!==l.id);
    lad.queue.push({id:l.id, name:l.name});       // 败者掉到队尾
  }
  lad.matchId=null;
  await store.set(K.ladder, lad, true);
}
async function ensureLayouts(mid){
  for(const ix of [0,1]){
    if(!MP.layouts[mid+'-'+ix]){
      const L=await store.get(K.L(mid,ix),true);
      if(L) MP.layouts[mid+'-'+ix]=L;
    }
  }
}
function shotsOn(match, boardIdx){ // 打在 players[boardIdx] 棋盘上的格子（对方所出）
  const shooter=match.players[1-boardIdx].id;
  return match.moves.filter(m=>m.by===shooter && m.i!=null).map(m=>m.i);
}
function killedOn(match, boardIdx){ // players[boardIdx] 被击落的机头数
  const L=MP.layouts[match.id+'-'+boardIdx]; if(!L) return 0;
  const hs=headSet(L); const shots=new Set(shotsOn(match,boardIdx));
  let n=0; for(const hd of hs) if(shots.has(hd)) n++;
  return n;
}
async function leaveLadder(){
  let lad=await store.get(K.ladder,true);
  // 1) 若在对局中，先认输并结算
  if(lad && lad.matchId){
    const m=await store.get(K.m(lad.matchId),true);
    if(m && m.phase!=='over' && m.players.some(p=>p.id===ME.id)){
      const opp=m.players.find(p=>p.id!==ME.id);
      m.phase='over'; m.winner=opp.id; m.reason='对手退出'; m.overAt=Date.now();
      await store.set(K.m(m.id),m,true);
      await finalizeMatch(m);
    }
  }
  // 2) 重新读取最新天梯，摘除自己
  lad=await store.get(K.ladder,true);
  if(lad){
    let dirty=false;
    if(lad.queue.some(q=>q.id===ME.id)){ lad.queue=lad.queue.filter(q=>q.id!==ME.id); dirty=true; }
    if(lad.championId===ME.id && !lad.matchId){ lad.championId=null; lad.championName=''; lad.streak=0; dirty=true; }
    if(dirty) await store.set(K.ladder,lad,true);
  }
  await store.del(K.hb(ME.id),true);
  go('home');
}

  async tick(){
    await hb();
    let lad=await store.get(K.ladder,true) || defaultLadder();
    MP.ladder=lad;
    let match=null;
    if(lad.matchId) match=await store.get(K.m(lad.matchId),true);
    MP.match=match;
    const inMatch = match && match.players.some(p=>p.id===ME.id);
    if(inMatch && match.phase==='place'){ go('place',match); return; }
    if(inMatch && match.phase==='battle'){ go('battle',match); return; }
    if(inMatch && match.phase==='over' && match.winner===ME.id && !MP.finalized){
      MP.finalized=true; await finalizeMatch(match); MP.finalized=false;
    }
    const isChamp = lad.championId===ME.id;
    const inQ = lad.queue.some(q=>q.id===ME.id);
    if(!isChamp && !inQ && !inMatch){
      lad.queue.push({id:ME.id,name:ME.name});
      await store.set(K.ladder,lad,true);
    }
    /* —— 协调者：擂主在场时是擂主，否则是队列第一名 —— */
    let coord=isChamp, champAlive=isChamp;
    if(!isChamp && lad.championId){
      const chb=await store.get(K.hb(lad.championId),true);
      champAlive=!!(chb && Date.now()-chb.t<CFG.STALE);
    }
    if(!isChamp && !champAlive && lad.queue[0] && lad.queue[0].id===ME.id) coord=true;
    if(coord){
      if(!champAlive && lad.championId && !lad.matchId){
        lad.championId=null; lad.championName=''; lad.streak=0;
        await store.set(K.ladder,lad,true);
      }
      MP.pruneTick=(MP.pruneTick+1)%4;
      // 双方都失联的废弃对局：由协调者回收，避免天梯卡死
      if(MP.pruneTick===0 && lad.matchId && match && match.phase!=='over'){
        let deadN=0, champDead=false;
        for(const p of match.players){
          const pb=await store.get(K.hb(p.id),true);
          if(!pb || Date.now()-pb.t>CFG.DEAD){ deadN++; if(p.id===lad.championId) champDead=true; }
        }
        if(deadN===2){
          if(champDead){ lad.championId=null; lad.championName=''; lad.streak=0; }
          lad.matchId=null;
          await store.set(K.ladder,lad,true);
          store.del(K.m(match.id),true); store.del(K.L(match.id,0),true); store.del(K.L(match.id,1),true);
          return;
        }
      }
      if(MP.pruneTick===0 && lad.queue.length){
        const keep=[];
        for(const q of lad.queue){
          if(q.id===ME.id){ keep.push(q); continue; }
          const qb=await store.get(K.hb(q.id),true);
          if(qb && Date.now()-qb.t<CFG.STALE) keep.push(q);
        }
        if(keep.length!==lad.queue.length){ lad.queue=keep; await store.set(K.ladder,lad,true); }
      }
      if(!lad.matchId){
        let a=null,b=null;
        if(lad.championId && champAlive){
          if(lad.queue.length>=1){ a={id:lad.championId,name:lad.championName}; b=lad.queue[0]; lad.queue=lad.queue.slice(1); }
        } else if(lad.queue.length>=2){ a=lad.queue[0]; b=lad.queue[1]; lad.queue=lad.queue.slice(2); }
        if(a&&b){
          const mid=uid();
          const doc={id:mid, players:[a,b], phase:'place', placeEnd:Date.now()+CFG.PLACE_MS,
            moves:[], tos:{}, turn:null, turnEnd:0, winner:null, reason:'', overAt:0, createdAt:Date.now()};
          await store.set(K.m(mid),doc,true);
          const old=lad.lastMatchId;
          if(old && old!==mid){ store.del(K.m(old),true); store.del(K.L(old,0),true); store.del(K.L(old,1),true); }
          lad.matchId=mid; lad.lastMatchId=mid;
          await store.set(K.ladder,lad,true);
          return; // 下个 tick 会跳入布阵
        }
      }
    }
    // 结果滞留兜底：胜者掉线时由任意在场者收尾
    if(match && match.phase==='over' && Date.now()-(match.overAt||0)>10000){
      await finalizeMatch(match);
    }
    this.render(lad, match);
  },
  async render(lad, match){

    const cc=$('#champCard'); if(!cc) return;
    if(lad.championId){
      cc.innerHTML='<div class="champ"><span class="crown">🏆</span><span>擂主 · '+esc(lad.championName)+'</span>'

  myLayout(){ return MP.layouts[MP.matchId+'-'+MP.myIdx]; },
  opLayout(){ return MP.layouts[MP.matchId+'-'+(1-MP.myIdx)]; },
  render(){
    if(CUR!=='battle') return;
    const m=MP.match; if(!m) return;
    const myL=this.myLayout(), opL=this.opLayout();
    if(myL){
      const shots=shotsOn(m,MP.myIdx);
      const last=[...m.moves].reverse().find(x=>x.by===MP.opp.id && x.i!=null);
      MP.mineB.paint({silPlanes:myL, map:valueMap(myL), shots, lastShot:last?last.i:-1});
    }
    if(opL){
      const shots=shotsOn(m,1-MP.myIdx);
      const last=[...m.moves].reverse().find(x=>x.by===ME.id && x.i!=null);
      MP.enemyB.paint({map:valueMap(opL), shots, lastShot:last?last.i:-1});
    }
    const myTurn = m.phase==='battle' && m.turn===ME.id;
    MP.enemyB.el.classList.toggle('locked', !myTurn);
    $('#btMy').textContent=killedOn(m,1-MP.myIdx);
    $('#btOp').textContent=killedOn(m,MP.myIdx);
    $('#btT0').className='boardtitle'+(m.turn===MP.opp.id&&m.phase==='battle'?' active':'');
    $('#btT1').className='boardtitle'+(myTurn?' active':'');
    const bn=$('#btBanner');
    if(m.phase==='battle') bn.innerHTML= myTurn ? '<span class="t">轮到你开火</span> —— 点击敌方空域任意云格' : '等待 <span class="t">'+esc(MP.opp.name)+'</span> 行动…';
    const myTos=(m.tos&&m.tos[ME.id])||0, opTos=(m.tos&&m.tos[MP.opp.id])||0;
    $('#btTos').textContent=(myTos||opTos)?('超时 你'+myTos+'/3 · 对方'+opTos+'/3'):'';
  },
  async fire(i){
    const m=MP.match;
    if(!m || m.phase!=='battle' || m.turn!==ME.id || MP.busyFire) return;
    if(!this.opLayout()){ toast('数据同步中…'); return; }
    if(m.moves.some(x=>x.by===ME.id && x.i===i)) return;
    MP.busyFire=true;
    try{
      const doc=await store.get(K.m(MP.matchId),true);
      if(!doc || doc.phase!=='battle' || doc.turn!==ME.id){ MP.match=doc||m; this.render(); return; }
      if(doc.moves.some(x=>x.by===ME.id && x.i===i)) return;
      doc.moves.push({by:ME.id, i, t:Date.now()});
      doc.tos[ME.id]=0;
      const mine=new Set(doc.moves.filter(x=>x.by===ME.id&&x.i!=null).map(x=>x.i));
      let killed=0; for(const hd of headSet(this.opLayout())) if(mine.has(hd)) killed++;
      if(killed>=3){ doc.phase='over'; doc.winner=ME.id; doc.reason='三机全灭'; doc.overAt=Date.now(); }
      else { doc.turn=MP.opp.id; doc.turnEnd=Date.now()+CFG.TURN_MS; }
      await store.set(K.m(MP.matchId),doc,true);
      MP.match=doc;
      // 命中动画
      const v=valueMap(this.opLayout())[i];
      this.render();
      MP.enemyB.cells[i].classList.add('pop');
      if(doc.phase==='over') this.onOver(doc);
    } finally { MP.busyFire=false; }
  },
  async tick(){
    await hb();
    const doc=await store.get(K.m(MP.matchId),true);
    if(!doc){ toast('对局已结束'); go('lobby'); return; }
    const prevMoves=MP.match?MP.match.moves.length:0;
    MP.match=doc;
    await ensureLayouts(doc.id);
    this.render();
    if(doc.moves.length>prevMoves){
      const nm=doc.moves[doc.moves.length-1];
      if(nm.by===MP.opp.id && nm.i!=null && MP.mineB.cells[nm.i]) MP.mineB.cells[nm.i].classList.add('pop');
    }
    if(doc.phase==='over'){ this.onOver(doc); return; }
    if(doc.phase!=='battle') return;
    const now=Date.now();
    // 超时执行：由等待方（我）替对方记一枪空过
    if(doc.turn===MP.opp.id && now>doc.turnEnd+CFG.GRACE){
      doc.moves.push({by:MP.opp.id, to:1, t:now});
      doc.tos[MP.opp.id]=((doc.tos[MP.opp.id])||0)+1;
      if(doc.tos[MP.opp.id]>=3){ doc.phase='over'; doc.winner=ME.id; doc.reason='对方连续超时'; doc.overAt=now; }
      else { doc.turn=ME.id; doc.turnEnd=now+CFG.TURN_MS; }
      await store.set(K.m(MP.matchId),doc,true);
      MP.match=doc; this.render();
      if(doc.phase==='over'){ this.onOver(doc); return; }
      toast('对方超时，轮到你了');
    }
    // 离线判定
    const ohb=await store.get(K.hb(MP.opp.id),true);
    if(!ohb || now-ohb.t>CFG.DEAD){
      doc.phase='over'; doc.winner=ME.id; doc.reason='对手离线'; doc.overAt=now;
      await store.set(K.m(MP.matchId),doc,true);
      MP.match=doc; this.onOver(doc);
    }
  },
  sec(){
    const el=$('#btTimer'); const m=MP.match;
    if(!el||!m||m.phase!=='battle') return;
    const left=Math.max(0, Math.ceil((m.turnEnd-Date.now())/1000));
    el.textContent=left;
    el.classList.toggle('urgent', left<=10);
  },
  async onOver(doc){
    if(MP.overShown) return;
    MP.overShown=true;
    const win=doc.winner===ME.id;
    // 复盘：翻开敌方全部飞机
    const opL=this.opLayout();
    if(opL) for(const p of opL) for(const cell of planeCells(p)){
      const i=cell.r*10+cell.c;
      const d=MP.enemyB.cells[i];
      if(!d.classList.contains('hith')&&!d.classList.contains('hitb')&&!d.classList.contains('sky'))
        d.classList.add(cell.h?'silhead':'sil');
    }
    if(win){ await finalizeMatch(doc); }
    const ov=h('div','overlay');
    ov.innerHTML='<div class="card"><h3 class="'+(win?'win':'lose')+'">'+(win?'胜利！':'落败')+'</h3>'
      +'<div>'+esc(doc.reason||'')+'</div>'
      +'<div class="note" style="margin-top:8px">'+(win?'你将留在擂台迎接下一位挑战者':'你已回到队列末尾，看看别人怎么打')+'</div>'
      +'<div class="note" id="ovCnt" style="margin-top:6px">4 秒后返回大厅…</div></div>';
    document.body.appendChild(ov);
    let n=4;
    const iv=setInterval(()=>{ n--; const c=$('#ovCnt'); if(c)c.textContent=n+' 秒后返回大厅…';
      if(n<=0){ clearInterval(iv); ov.remove(); if(CUR==='battle') go('lobby'); } },1000);
  },
  leave(){ document.querySelectorAll('.overlay').forEach(o=>o.remove()); }
};

/* ================= 启动 ================= */
(async function boot(){
  await loadProfile();
  go('home');
  setInterval(async()=>{
    if(pollBusy) return;
    pollBusy=true;
    try{ const s=SCREENS[CUR]; if(s&&s.tick) await s.tick(); }
    catch(e){ console.error(e); }
    finally{ pollBusy=false; }
  }, 2000);
  setInterval(()=>{ const s=SCREENS[CUR]; if(s&&s.sec) try{ s.sec(); }catch(e){} }, 500);
})();

</script>
